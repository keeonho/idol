  // Koi hanya bisa makan KOI_FOOD_SHOP, pet biasa hanya FOOD_SHOP
  const shop = isKoi ? KOI_FOOD_SHOP : FOOD_SHOP;
  const inv = getInv();
  const feedItems = Object.entries(shop).filter(([k, v]) => v.hunger || v.happy);
  // Tambah hasil ternak yang ada di inventori (untuk pet biasa, bukan koi)
  const livestockFeedItems = !isKoi
    ? Object.entries(LIVESTOCK_FOOD).filter(([k]) => (inv[k]||0) > 0)
    : [];

  // Fetch custom food items metadata
  let customFoodMeta = {};
  try {
    const { data: customRes } = await db.from('custom_items')
      .select('item_key,name,emoji,item_type,hunger,xp,happy')
      .eq('owner_id', parseInt(USER_ID))
      .eq('item_type', 'food');
    for (const ci of (customRes||[])) customFoodMeta[ci.item_key] = ci;
  } catch(e) {}
  const customFoodItems = !isKoi
    ? Object.entries(inv).filter(([k,v]) => v > 0 && k.startsWith('custom_food_') && customFoodMeta[k])
    : [];

  const hasFood = feedItems.some(([k]) => (inv[k]||0) > 0)
    || livestockFeedItems.length > 0
    || customFoodItems.length > 0;

  let itemsHtml = '';
  if (!hasFood) {
    itemsHtml = `<div class="empty-state" style="padding:20px">
      <span class="empty-state-emoji">🍽️</span>
      <div class="empty-state-title">${isKoi ? 'Belum punya makanan ikan!' : 'Inventori makanan kosong!'}</div>
      <p style="font-size:0.83rem;color:var(--text-soft);margin-bottom:14px">Beli dulu di toko ya~</p>
      <button class="btn btn-lavender" onclick="showScreen('shop')">🛒 Ke Toko</button>
    </div>`;
  } else {
    const regularItems = feedItems.map(([key, food]) => {
      const count = inv[key]||0;
      if (!count) return '';
      const effects = [];
      if (food.hunger) effects.push(`🍖 -${food.hunger} lapar`);
      if (food.happy) effects.push(`😊 +${food.happy} senang`);
      if (food.xp) effects.push(`✨ +${food.xp} XP`);
      return `
        <div class="shop-item" onclick="doFeed('${key}')" style="cursor:pointer">
          <div class="shop-item-left">
            <div class="shop-item-emoji">${food.emoji}</div>
            <div>
              <div class="shop-item-name">${food.name}</div>
              <div class="shop-item-desc">${effects.join(' · ')}</div>
            </div>
          </div>
          <div style="text-align:right">
            <div style="font-size:0.78rem;color:var(--text-soft);font-weight:700">Stok</div>
            <div style="font-weight:800;color:#9b73d4;font-size:1rem">x${count}</div>
          </div>
        </div>`;
    }).join('');
    // Hasil ternak yang bisa dikasih ke pet
    const ternakItems = livestockFeedItems.map(([key, food]) => {
      const count = inv[key]||0;
      const effects = [];
      if (food.hunger) effects.push(`🍖 -${food.hunger} lapar`);
      if (food.happy) effects.push(`😊 +${food.happy} senang`);
      if (food.xp) effects.push(`✨ +${food.xp} XP`);
      return `
        <div class="shop-item" onclick="doFeedLivestock('${key}')" style="cursor:pointer;border-left:3px solid rgba(181,234,215,0.8)">
          <div class="shop-item-left">
            <div class="shop-item-emoji">${food.emoji}</div>
            <div>
              <div class="shop-item-name">${food.name} <span style="font-size:0.7rem;color:#5CAF8E;font-weight:800">Ternak</span></div>
              <div class="shop-item-desc">${effects.join(' · ')}</div>
            </div>
          </div>
          <div style="text-align:right">
            <div style="font-size:0.78rem;color:var(--text-soft);font-weight:700">Stok</div>
            <div style="font-weight:800;color:#5CAF8E;font-size:1rem">x${count}</div>
          </div>
        </div>`;
    }).join('');
    // Custom food items
    const customItems = customFoodItems.map(([key, count]) => {
      const ci = customFoodMeta[key] || {};
      return `
        <div class="shop-item" onclick="doFeedCustom('${key}')" style="cursor:pointer;border-left:3px solid rgba(201,184,240,0.8)">
          <div class="shop-item-left">
            <div class="shop-item-emoji">${ci.emoji || '🍖'}</div>
            <div>
              <div class="shop-item-name">${ci.name || key} <span style="font-size:0.7rem;color:#9b73d4;font-weight:800">Custom</span></div>
              <div class="shop-item-desc">🍖 -${ci.hunger||30} lapar · ✨ +${ci.xp||5} XP</div>
            </div>
          </div>
          <div style="text-align:right">
            <div style="font-size:0.78rem;color:var(--text-soft);font-weight:700">Stok</div>
            <div style="font-weight:800;color:#9b73d4;font-size:1rem">x${count}</div>
          </div>
        </div>`;
    }).join('');
    itemsHtml = regularItems
      + (ternakItems ? `<div class="section-label" style="margin-top:10px">🐄 Dari Ternak</div>${ternakItems}` : '')
      + (customItems ? `<div class="section-label" style="margin-top:10px">🛠️ Item Custom</div>${customItems}` : '');
  }

  const info = PETS[activePet.pet_type]||{emoji:'🐾'};
  el.innerHTML = `
    <div class="card" style="text-align:center;padding:16px${isKoi?';background:rgba(10,25,50,0.55);border:1.5px solid rgba(100,200,255,0.15)':''}">
      <div style="font-size:2.5rem">${info.emoji}</div>
      <div style="font-weight:800;font-size:1.05rem;margin-top:6px;${isKoi?'color:#7dd8ff':''}">${activePet.name}</div>
      <div style="font-size:0.82rem;color:var(--text-soft);margin-top:4px">Lapar: <b style="color:${(activePet.hunger||0)>70?'#d4556a':'#9b73d4'}">${activePet.hunger||0}%</b></div>
      ${isKoi?'<div style="font-size:0.75rem;color:rgba(100,200,255,0.6);margin-top:4px">🐟 Khusus makanan ikan</div>':''}
    </div>
    <div class="section-label">🍱 Pilih makanan dari inventori</div>
    ${itemsHtml}
  `;
}

// ==================== LEVEL UP HELPER ====================
const _levelUpNotifSent = new Set();

async function checkLevelUp(pet, oldXp, newXp) {
  const oldLv = calcLevel(oldXp);
  const newLv = calcLevel(newXp);
  if (newLv <= oldLv) return;

  // Cegah notif dobel dalam sesi yang sama
  const notifKey = `${pet.id}_lv${newLv}`;
  if (_levelUpNotifSent.has(notifKey)) return;
  _levelUpNotifSent.add(notifKey);

  const info      = PETS[pet.pet_type] || { emoji:'🐾' };
  const unlockMsg = LEVEL_UNLOCKS[newLv] || '';

  // Toast di web
  showToast(`🎉 LEVEL UP! ${info.emoji} ${pet.name} Lv.${newLv}!`);

  // Notif Telegram — deduplicate owner (kalau owner1 == owner2 kirim 1x aja)
  const msg =
    `🎉 <b>LEVEL UP!</b>\n` +
    `${info.emoji} <b>${pet.name}</b> naik ke <b>Level ${newLv}</b>!\n\n` +
    (unlockMsg ? `🎁 <b>Unlock baru:</b>\n${unlockMsg}` : `✨ Terus rawat petmu ya~`);

  const owners = [...new Set([pet.owner1_id, pet.owner2_id].filter(Boolean))];
  for (const oid of owners) {
    await sendTgNotif(oid, msg);
  }
}

async function doFeedLivestock(key) {
  // Kasih hasil ternak ke pet — pakai LIVESTOCK_FOOD data
  if (!activePet) return;
  const inv = getInv();
  if (!inv[key] || inv[key] <= 0) { showToast('❌ Stok habis!'); return; }
  const food = LIVESTOCK_FOOD[key];
  if (!food) { showToast('❌ Item tidak dikenal!'); return; }

  const { data: freshPet } = await db.from('pets').select('*').eq('id', activePet.id).single();
  if (!freshPet) { showToast('❌ Gagal load data pet!'); return; }

  inv[key] -= 1;
  if (inv[key] === 0) delete inv[key];
  const oldXp = freshPet.xp || 0;
  const newHunger = Math.max(0, (freshPet.hunger||0) - (food.hunger||0));
  const newHappy  = Math.min(100, (freshPet.happiness ?? 0) + (food.happy||0));
  const newXp     = oldXp + (food.xp||0);
  const newLv     = calcLevel(newXp);

  await saveInv(inv);
  const nowIso = new Date().toISOString();
  await savePet(activePet.id, { hunger: newHunger, happiness: newHappy, xp: newXp, level: newLv, last_decay: nowIso });
  Object.assign(activePet, { hunger: newHunger, happiness: newHappy, xp: newXp, level: newLv });

  showToast(`${food.emoji} ${freshPet.name} makan ${food.name}! Lapar -${food.hunger||0}`);
  await checkLevelUp(freshPet, oldXp, newXp);

  const partnerId = getPartnerIdOf(freshPet);
  const senderName = window.Telegram?.WebApp?.initDataUnsafe?.user?.first_name || 'Partnermu';
  const petInfo = PETS[freshPet.pet_type] || { emoji:'🐾' };
  sendTgNotif(partnerId, `🐄 <b>${senderName}</b> kasih ${food.emoji} <b>${food.name}</b> ke ${petInfo.emoji} <b>${freshPet.name}</b>!\nLapar -${food.hunger||0}`);
  renderFeed();
  if (currentScreen === 'home') renderHome();
}

async function doFeed(key) {
  if (!activePet) return;
  const inv = getInv();
  if (!inv[key] || inv[key] <= 0) { showToast('❌ Stok habis!'); return; }

  const isKoi = activePet.pet_type === 'koi';
  const food = isKoi ? (KOI_FOOD_SHOP[key] || FOOD_SHOP[key]) : (FOOD_SHOP[key] || LIVESTOCK_FOOD[key]);
  if (!food) { showToast('❌ Item tidak dikenal!'); return; }

  // Fetch data pet terbaru dari Supabase dulu biar ga stale
  const { data: freshPet } = await db.from('pets').select('*').eq('id', activePet.id).single();
  if (!freshPet) { showToast('❌ Gagal load data pet!'); return; }

  inv[key] -= 1;
  if (inv[key] === 0) delete inv[key];

  const oldXp     = freshPet.xp || 0;
  const newHunger = Math.max(0, (freshPet.hunger||0) - (food.hunger||0));
  const newHappy  = Math.min(100, (freshPet.happiness ?? 0) + (food.happy||5));
  const newHealth = food.heal ? Math.min(100, (freshPet.health||100) + food.heal) : undefined;
  const newXp     = oldXp + (food.xp||0);
  const newLv     = calcLevel(newXp);

  await saveInv(inv);
  const nowIso = new Date().toISOString();
  const updateData = { hunger: newHunger, happiness: newHappy, xp: newXp, level: newLv, last_decay: nowIso };
  if (newHealth !== undefined) updateData.health = newHealth;
  await savePet(activePet.id, updateData);

  Object.assign(activePet, updateData);

  showToast(`${food.emoji} ${freshPet.name} makan ${food.name}! Lapar -${food.hunger||0}`);

  await checkLevelUp(freshPet, oldXp, newXp);

  const partnerId  = getPartnerIdOf(freshPet);
  const senderName = window.Telegram?.WebApp?.initDataUnsafe?.user?.first_name || 'Partnermu';
  const info       = PETS[freshPet.pet_type] || { emoji:'🐾' };
  sendTgNotif(partnerId, `🍽️ <b>${senderName}</b> kasih makan ${info.emoji} <b>${freshPet.name}</b>!\n${food.emoji} ${food.name} — Lapar -${food.hunger||0}`);

  renderFeed();
  if (currentScreen === 'home') renderHome();
}

async function doBuy(key) {
  const allShop = { ...FOOD_SHOP, ...KOI_FOOD_SHOP };
  const item = allShop[key];
  const koin = userData?.koin || 0;
  if (koin < item.price) { showToast(`❌ Koin tidak cukup! Butuh ${item.price} 🪙`); return; }
  const inv = getInv();
  inv[key] = (inv[key]||0) + 1;
  const newKoin = koin - item.price;
  await saveInv(inv);
  await saveUser({ koin: newKoin });
  showToast(`✅ Beli ${item.emoji} ${item.name}! Sisa ${newKoin} 🪙`);
  renderShop();
}

async function doBuatItem() {
  await loadUser();
  const koin = userData?.koin || 0;
  if (koin < 1000) { showToast('❌ Koin tidak cukup!'); return; }
  if (!buatItemNama || !buatItemEmoji || !buatItemType) {
    showToast('⚠️ Data item tidak lengkap!'); return;
  }

  const slug = buatItemNama.toLowerCase().replace(/[^a-z0-9]/g,'').substring(0,20) || 'item';
  const invKey = `custom_${buatItemType}_${slug}`;
  const uid = parseInt(USER_ID);

  // Bayar dulu
  await saveUser({ koin: koin - 1000 });

  // Fetch inventory FRESH dari DB
  const { data: freshUserData, error: fetchErr } = await db.from('users')
    .select('inventory').eq('user_id', uid).maybeSingle();
  if (fetchErr) {
    showToast(`❌ Fetch inv error: ${fetchErr.message}`);
    await saveUser({ koin: koin }); // rollback
    return;
  }
  let inv = freshUserData?.inventory || {};
  if (typeof inv === 'string') try { inv = JSON.parse(inv); } catch { inv = {}; }

  // Tambah item
  inv[invKey] = (inv[invKey]||0) + 5;

  // Simpan inventory langsung
  const { error: saveErr } = await db.from('users')
    .update({ inventory: inv }).eq('user_id', uid);
  if (saveErr) {
    showToast(`❌ Save inv error: ${saveErr.message}`);
    await saveUser({ koin: koin }); // rollback
    return;
  }
  if (userData) userData.inventory = inv;

  // Simpan metadata ke custom_items table — upsert biar tidak duplicate key error
  const { error: ciErr } = await db.from('custom_items').upsert({
    owner_id: uid, item_key: invKey,
    name: buatItemNama, emoji: buatItemEmoji, item_type: buatItemType,
    hunger: buatItemType === 'food' ? 30 : 0,
    xp: buatItemType === 'food' ? 5 : 0, happy: 0,
    created_at: new Date().toISOString(),
  }, { onConflict: 'owner_id,item_key' });
  if (ciErr) showToast(`⚠️ Meta error: ${ciErr.message}`); // non-fatal

  closeModal();
  showModal(`<div class="modal-box">
    <div class="modal-handle"></div>
    <div style="text-align:center">
      <div style="font-size:3.5rem;margin-bottom:12px">${buatItemEmoji}</div>
      <div class="modal-title">Item Berhasil Dibuat!</div>
      <p style="color:var(--text-soft);margin-bottom:16px">
        <b>${buatItemEmoji} ${buatItemNama}</b> x5<br>
        Masuk ke inventori kamu~<br>
        <span style="font-size:0.8rem">Lihat di tab 🎒 Inventori</span>
      </p>
      <button class="btn btn-lavender" onclick="closeModal();renderInventory();showScreen('inv')">🎒 Lihat Inventori</button>
    </div>
  </div>`);
}

async function renderInventory() {
  const el = document.getElementById('inv-content');
  el.innerHTML = '<div class="loading"><div class="loading-emoji">🎒</div><div class="loading-text">Loading inventori...</div></div>';
  try {
    // Fetch inventory + custom items metadata sekaligus
    const [userRes, customRes] = await Promise.all([
      db.from('users').select('inventory').eq('user_id', USER_ID).maybeSingle(),
      db.from('custom_items').select('item_key,name,emoji,item_type,hunger,xp,happy').eq('owner_id', parseInt(USER_ID)),
    ]);
    let inv = userRes.data?.inventory || {};
    if (typeof inv === 'string') try { inv = JSON.parse(inv); } catch { inv = {}; }
    if (userData) userData.inventory = inv;
    // Build custom items metadata map
    const customMeta = {};
    for (const ci of (customRes.data || [])) {
      customMeta[ci.item_key] = ci;
    }
    _renderInventoryContent(el, inv, customMeta);
  } catch(e) {
    _renderInventoryContent(el, getInv(), {});
  }
}

function _renderInventoryContent(el, inv, customItemsMeta = {}) {
  const allFoodShop = { ...FOOD_SHOP, ...KOI_FOOD_SHOP };
  const foodItems    = Object.entries(inv).filter(([k,v]) => v > 0 && allFoodShop[k]);
  const specialItems = Object.entries(inv).filter(([k,v]) => v > 0 && SPECIAL_SHOP[k]);
  const ternakItems  = Object.entries(inv).filter(([k,v]) => v > 0 && LIVESTOCK_FOOD[k] && !allFoodShop[k]);
  const customItems  = Object.entries(inv).filter(([k,v]) => v > 0 && k.startsWith('custom_') && customItemsMeta[k]);
  const gachaItemsInInv = Object.entries(inv).filter(([k,v]) => v > 0 && GACHA_ITEMS[k]);
  const hasAny = foodItems.length > 0 || specialItems.length > 0 || ternakItems.length > 0 || customItems.length > 0 || gachaItemsInInv.length > 0;

  if (!hasAny) {
    el.innerHTML = `
      <div class="empty-state">
        <span class="empty-state-emoji">🎒</span>
        <div class="empty-state-title">Inventori kosong!</div>
        <p style="font-size:0.83rem;color:var(--text-soft);margin-bottom:14px">Beli atau buat item dulu~</p>
        <button class="btn btn-lavender" onclick="showScreen('shop')" style="margin-bottom:8px">🛒 Ke Toko</button>
        <button class="btn btn-mint" onclick="showBuatItem()">🛠️ Buat Item Sendiri</button>
      </div>`;
    return;
  }

  const foodGrid = foodItems.map(([key, count]) => {
    const food = allFoodShop[key];
    return `
      <div class="inv-item" onclick="${food.hunger||food.happy ? `doFeedDirect('${key}')` : ''}">
        <span class="inv-item-emoji">${food.emoji}</span>
        <div class="inv-item-name">${food.name}</div>
        <div class="inv-item-count">x${count}</div>
      </div>`;
  }).join('');

  const specialGrid = specialItems.map(([key, count]) => {
    const item = SPECIAL_SHOP[key];
    let actionBtn = '';
    if (item.category === 'bath') {
      actionBtn = `<button class="btn btn-mint" onclick="useItemOnPet('bath','${key}')" style="margin-top:6px;padding:5px 10px;font-size:0.72rem;width:100%">🛁 Kasih ke Pet</button>`;
    } else if (item.category === 'gift') {
      actionBtn = `<button class="btn btn-lavender" onclick="useItemOnPet('gift','${key}')" style="margin-top:6px;padding:5px 10px;font-size:0.72rem;width:100%">🎁 Kasih ke Pet</button>`;
    } else if (item.category === 'acc') {
      actionBtn = `<button class="btn btn-yellow" onclick="equipAccessory('${key}')" style="margin-top:6px;padding:5px 10px;font-size:0.72rem;width:100%">✨ Pasang</button>`;
    }
    return `
      <div class="inv-item">
        <span class="inv-item-emoji">${item.emoji}</span>
        <div class="inv-item-name">${item.name}</div>
        <div class="inv-item-count">x${count}</div>
        ${actionBtn}
      </div>`;
  }).join('');

  el.innerHTML = `
    <div class="card" style="margin-bottom:14px">
      <div class="card-title">🎒 Inventori Kamu</div>
      <div style="font-size:0.8rem;color:var(--text-soft)">Tap makanan untuk langsung kasih ke pet~</div>
    </div>
    ${foodItems.length > 0 ? `<div class="section-label">🍽️ Makanan</div><div class="inv-grid">${foodGrid}</div>` : ''}
    ${specialItems.length > 0 ? `<div class="section-label">🛍️ Special Items</div><div class="inv-grid">${specialGrid}</div>` : ''}
    ${ternakItems.length > 0 ? `
      <div class="section-label">🐄 Hasil Ternak</div>
      <div class="inv-grid">
        ${ternakItems.map(([key, count]) => {
          const food = LIVESTOCK_FOOD[key] || {};
          return `<div class="inv-item" onclick="doFeedLivestock('${key}')">
            <span class="inv-item-emoji">${food.emoji}</span>
            <div class="inv-item-name">${food.name}</div>
            <div class="inv-item-count" style="color:#5CAF8E">x${count}</div>
          </div>`;
        }).join('')}
      </div>` : ''}
    ${customItems.length > 0 ? `
      <div class="section-label">🛠️ Item Custom</div>
      <div class="inv-grid">
        ${customItems.map(([key, count]) => {
          const ci = customItemsMeta[key] || {};
          const isFood = ci.item_type === 'food';
          const isAcc  = ci.item_type === 'accessory';
          return `<div class="inv-item">
            <span class="inv-item-emoji">${ci.emoji || '🎁'}</span>
            <div class="inv-item-name">${ci.name || key}</div>
            <div class="inv-item-count" style="color:#9b73d4">x${count}</div>
            <div style="font-size:0.65rem;color:var(--text-soft)">${isFood ? '🍖 Makanan' : '👒 Aksesoris'}</div>

    ${gachaItemsInInv.length > 0 ? '<div class="section-label">🎰 Item Gacha</div><div class="inv-grid">' + gachaItemsInInv.map(([key,count]) => {
          const gi = GACHA_ITEMS[key];

            '<span class="inv-item-emoji">' + gi.emoji + '</span>' +
            '<div class="inv-item-name">' + gi.name + '</div>' +
            '<div class="inv-item-count" style="color:#9b73d4">x' + count + '</div>' +
            '<div style="font-size:0.65rem;color:var(--text-soft)">' + gi.desc + '</div>' +
            '<button class="btn btn-lavender" onclick="useGachaItem(\'' + key + '\')" style="margin-top:4px;padding:4px 8px;font-size:0.7rem;width:100%">✨ Pakai</button>' +
          '</div>';
        }).join('') + '</div>' : ''}
    <div style="margin-top:14px">
      <button class="btn btn-soft" onclick="showScreen('shop')" style="margin-bottom:8px">🛒 Toko Makan</button>
      <button class="btn btn-soft" onclick="showBuatItem()" style="margin-bottom:8px">🛠️ Buat Item</button>
      <button class="btn btn-soft" onclick="showScreen('special')" style="margin-bottom:8px">🛍️ Special Store</button>
      <button class="btn btn-soft" onclick="showScreen('ternak')">🐄 Lihat Ternak</button>
    </div>
  `;
}

async function doFeedDirect(key) {

}

async function doFeedCustom(invKey) {
  if (!activePet) { showToast('❌ Pilih pet dulu di tab 🏠!'); return; }
  const inv = getInv();
  if (!inv[invKey] || inv[invKey] <= 0) { showToast('❌ Item habis!'); return; }

  // Cek boarding
  if (activePet.boarding_until && new Date(activePet.boarding_until) > new Date()) {
    showToast('🏨 Pet lagi di penitipan! Ga bisa dikasih makan~'); return;
  }

  // Fetch metadata item custom dari DB
  let ci = null;
  try {
    const { data } = await db.from('custom_items')
      .select('name,emoji,hunger,xp,happy')
      .eq('owner_id', parseInt(USER_ID)).eq('item_key', invKey).maybeSingle();
    ci = data;
  } catch(e) {}
  const hungerReduce = ci?.hunger ?? 30;
  const xpGain      = ci?.xp    ?? 5;
  const happyGain   = ci?.happy  ?? 0;
  const itemName    = ci?.name   || invKey;
  const itemEmoji   = ci?.emoji  || '🍖';

  // Fetch data pet terbaru supaya tidak stale
  const { data: freshPet } = await db.from('pets').select('*').eq('id', activePet.id).single();
  if (!freshPet) { showToast('❌ Gagal load data pet!'); return; }

  // Kurangi inventory
  inv[invKey] = inv[invKey] - 1;
  if (inv[invKey] === 0) delete inv[invKey];
  await saveInv(inv);

  // Hitung stat baru
  const oldXp     = freshPet.xp || 0;
  const newHunger = Math.max(0, (freshPet.hunger || 0) - hungerReduce);
  const newHappy  = happyGain ? Math.min(100, (freshPet.happiness ?? 0) + happyGain) : undefined;
  const newXp     = oldXp + xpGain;
  const newLv     = calcLevel(newXp);
  const nowIso    = new Date().toISOString();

  const updateData = { hunger: newHunger, xp: newXp, level: newLv, last_decay: nowIso };
  if (newHappy !== undefined) updateData.happiness = newHappy;
  await savePet(activePet.id, updateData);
  Object.assign(activePet, updateData);

  const effects = [`🍖 -${hungerReduce} lapar`, `✨ +${xpGain} XP`];
  if (happyGain) effects.push(`😊 +${happyGain} senang`);
  showToast(`${itemEmoji} ${freshPet.name} makan ${itemName}! ${effects.join(' ')}`);

  await checkLevelUp(freshPet, oldXp, newXp);

  const partnerId  = getPartnerIdOf(freshPet);
  const senderName = window.Telegram?.WebApp?.initDataUnsafe?.user?.first_name || 'Partnermu';
  const petInfo    = PETS[freshPet.pet_type] || { emoji:'🐾' };
  sendTgNotif(partnerId, `🍽️ <b>${senderName}</b> kasih makan ${petInfo.emoji} <b>${freshPet.name}</b>!\n${itemEmoji} ${itemName} (custom) — Lapar -${hungerReduce}`);

  if (currentScreen === 'feed') renderFeed();
  else renderInventory();
  if (currentScreen === 'home') renderHome();
}

async function useItemOnPet(type, itemKey) {

    }).join('');

async function doUseItemOnPet(type, itemKey, petIdx) {
  closeModal();
  const pet  = userPets[petIdx];
  if (!pet) return;
  const item = SPECIAL_SHOP[itemKey];
  const inv  = getInv();

  if (type === 'bath') {
    // Pakai sebagai sabun mandi
    const lastBath  = pet.last_bath ? new Date(pet.last_bath) : null;
    const bathDays  = pet.soap_premium_active ? 2 : 1;
    if (lastBath && (Date.now() - lastBath.getTime()) / 3600000 < bathDays * 24) {
      showToast(`🛁 Sudah mandi! Tunggu dulu~`); return;
    }
    inv[itemKey] -= 1;
    if (inv[itemKey] === 0) delete inv[itemKey];
    await saveInv(inv);
    const updates = {
      last_bath: new Date().toISOString(), is_dirty: false,
      health: Math.min(100, (pet.health ?? 0) + (item.health||5)),
      happiness: Math.min(100, (pet.happiness ?? 0) + (item.happy||0)),
      soap_premium_active: item.bath_days === 2,
      ...(item.wangi_hours ? { wangi_until: new Date(Date.now() + item.wangi_hours*3600000).toISOString() } : {}),
    };
    await savePet(pet.id, updates);
    showToast(`🛁 ${pet.name} mandi pakai ${item.emoji} ${item.name}!`);
  } else {
    // Gift item — apply efek
    inv[itemKey] -= 1;
    if (inv[itemKey] === 0) delete inv[itemKey];
    await saveInv(inv);
    const updates = {};
    if (item.happy)  updates.happiness = Math.min(100, (pet.happiness ?? 0) + item.happy);
    if (item.xp)     updates.xp = (pet.xp||0) + item.xp;
    if (item.hunger) updates.hunger = Math.max(0, (pet.hunger ?? 50) - item.hunger);
    if (Object.keys(updates).length) await savePet(pet.id, updates);
    const effects = [];
    if (item.happy)  effects.push(`😊 +${item.happy}`);
    if (item.xp)     effects.push(`✨ +${item.xp} XP`);
    if (item.hunger) effects.push(`🍖 -${item.hunger} lapar`);
    showToast(`🎁 ${item.emoji} dikasih ke ${pet.name}! ${effects.join(' | ')}`);
  }

  // Notif ke partner
  const partnerId  = getPartnerIdOf(pet);
  const senderName = window.Telegram?.WebApp?.initDataUnsafe?.user?.first_name || 'Partnermu';
  const petInfo    = PETS[pet.pet_type] || { emoji:'🐾' };
  sendTgNotif(partnerId,
    `${type === 'gift' ? '🎁' : '🛁'} <b>${senderName}</b> kasih ${item.emoji} <b>${item.name}</b> ke ${petInfo.emoji} <b>${pet.name}</b>!`
  );

  await loadPets();
  renderInventory();
  if (currentScreen === 'home') renderHome();
}

async function useGameQuota(game) {
  const games = getGames();
  games[game] = (games[game]||0) + 1;
  await saveGames(games);
}

function checkQuota(game) {
  const games = getGames();
  return GAME_MAX_PER_DAY - (games[game]||0) > 0;
}

const GROQ_PROXY    = 'https://carpetshopc.ahmadadrian737.workers.dev/ollama';
const GROQ_MODEL    = 'gemma3:1b';
const CHAT_MAX_PER_DAY = 150;
const CHAT_QUOTA_KEY   = () => `chat_quota_${USER_ID}_${new Date().toLocaleDateString('en-CA',{timeZone:'Asia/Jakarta'})}`;

let chatMessages = {}; // {petId: [{role, text, time}]}
let chatIsSending = false;
let chatCurrentPetId = null;

function getChatQuota() {
  const used = parseInt(localStorage.getItem(CHAT_QUOTA_KEY()) || '0');
  return CHAT_MAX_PER_DAY - used;
}
function useChatQuota() {
  const key = CHAT_QUOTA_KEY();
  const used = parseInt(localStorage.getItem(key) || '0');
  localStorage.setItem(key, used + 1);
}

async function callGroq(messages) {
  try {
    const res = await fetch(GROQ_PROXY, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ollama' },
      body: JSON.stringify({
        model: GROQ_MODEL,
        messages,
        max_tokens: 120,
        temperature: 0.85,
      })
    });
    if (!res.ok) return null;
    const data = await res.json();
    return data.choices?.[0]?.message?.content?.trim() || null;
  } catch { return null; }
}

function renderChat() {
  const el = document.getElementById('chat-content');
  if (!activePet) {
    el.innerHTML = `<div class="empty-state" style="margin-top:40px">
      <span class="empty-state-emoji">💬</span>
      <div class="empty-state-title">Belum punya pet!</div>
      <p style="font-size:0.85rem;color:var(--text-soft)">Adopt dulu biar bisa ngobrol~</p>
    </div>`;
    return;
  }

  const isKoi = activePet.pet_type === 'koi';
  const info  = PETS[activePet.pet_type] || { emoji: '🐾', name: '?' };
  const lv    = calcLevel(activePet.xp || 0);
  const quota = getChatQuota();
  const petId = activePet.id;
  const msgs  = chatMessages[petId] || [];

  // Build chat bubbles HTML
  const bubblesHtml = msgs.length === 0
    ? `<div class="chat-date-sep">Mulai ngobrol dengan ${activePet.name}~ 💕</div>`
    : msgs.map(m => {
        const timeStr = m.time || '';
        if (m.role === 'user') {
          return `<div class="chat-bubble user">${m.text}<div style="font-size:0.65rem;opacity:0.7;margin-top:4px;text-align:right">${timeStr}</div></div>`;
        } else {
          return `<div class="chat-bubble pet${isKoi?' koi-bubble':''}">${info.emoji} ${m.text}<div style="font-size:0.65rem;opacity:0.6;margin-top:4px">${timeStr}</div></div>`;
        }
      }).join('');

  el.innerHTML = `
    <div class="chat-wrap">
      <div class="chat-pet-header${isKoi?' koi-header-chat':''}">
        <span style="font-size:2.2rem">${info.emoji}</span>
        <div>
          <div style="font-weight:800;font-size:1rem;${isKoi?'color:#7dd8ff':''}">${activePet.name}</div>
          <div style="font-size:0.75rem;color:var(--text-soft)">Lv.${lv} • ${info.name}${isKoi?' ⭐':''}</div>
        </div>
      </div>
      <div class="chat-messages" id="chat-messages-box">
        ${bubblesHtml}
      </div>
      <div class="chat-quota" id="chat-quota-txt" style="${quota<=3?'color:#d4556a':''}">
        ${quota > 0 ? `💬 ${quota} pesan tersisa hari ini` : '❌ Limit chat harian habis! Reset besok~'}
      </div>
      <div class="chat-input-wrap">
        <input id="chat-input" class="chat-input${isKoi?' koi-input':''}"
          type="text" maxlength="100"
          placeholder="${quota > 0 ? `Ngobrol sama ${activePet.name}...` : 'Limit habis~'}"
          ${quota <= 0 ? 'disabled' : ''}
          onkeydown="if(event.key==='Enter')sendChatMessage()"
        />
        <button class="chat-send-btn${isKoi?' koi-send':''}" onclick="sendChatMessage()" ${quota<=0?'disabled style="opacity:0.4"':''}>
          ➤
        </button>
      </div>
    </div>
  `;

  // Scroll to bottom
  setTimeout(() => {
    const box = document.getElementById('chat-messages-box');
    if (box) box.scrollTop = box.scrollHeight;
  }, 50);
}

async function sendChatMessage() {
  if (chatIsSending) return;
  const input = document.getElementById('chat-input');
  const text  = input?.value?.trim();
  if (!text || !activePet) return;

  const quota = getChatQuota();
  if (quota <= 0) { showToast('❌ Limit chat harian habis!'); return; }

  const petId = activePet.id;
  if (!chatMessages[petId]) chatMessages[petId] = [];

  input.value = '';
  chatIsSending = true;

  // Tambah bubble user
  const now = new Date().toLocaleTimeString('id-ID', { hour:'2-digit', minute:'2-digit' });
  chatMessages[petId].push({ role: 'user', text, time: now });
  useChatQuota();
  renderChat();

  // Tambah typing indicator
  const box = document.getElementById('chat-messages-box');
  if (box) {
    const typing = document.createElement('div');
    typing.className = `chat-bubble pet typing${activePet.pet_type === 'koi' ? ' koi-bubble' : ''}`;
    typing.id = 'typing-indicator';
    typing.innerHTML = `<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>`;
    box.appendChild(typing);
    box.scrollTop = box.scrollHeight;
  }

  // Build messages untuk Groq — pakai history pet ini saja
  const systemPrompt = buildPetSystemPrompt(activePet);
  const history = chatMessages[petId].slice(-10).map(m => ({
    role: m.role === 'user' ? 'user' : 'assistant',
    content: m.text
  }));
  const groqMessages = [
    { role: 'system', content: systemPrompt },
    ...history
  ];

  const reply = await callGroq(groqMessages);

  // Hapus typing indicator
  document.getElementById('typing-indicator')?.remove();

  const replyTime = new Date().toLocaleTimeString('id-ID', { hour:'2-digit', minute:'2-digit' });
  if (reply) {
    chatMessages[petId].push({ role: 'pet', text: reply, time: replyTime });
  } else {
    const info = PETS[activePet.pet_type] || { emoji: '🐾' };
    const ngambek = activePet.pet_type === 'koi'
      ? '>:| blub... aku lagi ga mood ngomong.'
      : `${info.emoji} ${activePet.name} lagi ngambek, coba lagi nanti~`;
    chatMessages[petId].push({ role: 'pet', text: ngambek, time: replyTime });
  }

  chatIsSending = false;
  renderChat();
}

  } catch { return { ...DEFAULT_PET_THEME }; }
}

  try { localStorage.setItem(PET_THEME_KEY(petId), JSON.stringify(theme)); } catch {}
}

  if (!theme) return BG_PRESETS[0].style;

  }

}

// ---- Image compress utility (canvas-based) ----
function compressImage(file, { maxW = 800, maxH = 800, quality = 0.72, mimeType = 'image/jpeg' } = {}) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = reject;
    reader.onload = (e) => {
      const img = new Image();
      img.onerror = reject;
      img.onload = () => {
        let { width: w, height: h } = img;
        const ratio = Math.min(maxW / w, maxH / h, 1);
        w = Math.round(w * ratio);
        h = Math.round(h * ratio);
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL(mimeType, quality));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function custLoadPhoto(event) {
  const file = event.target.files[0];
  if (!file) return;
  if (file.size > 10 * 1024 * 1024) { showToast('❌ Foto max 10MB ya~'); return; }
  showToast('⏳ Compressing...');
  compressImage(file, { maxW: 900, maxH: 900, quality: 0.70 }).then(b64 => {
    window._custTheme.bgType = 'photo';
    window._custTheme.bgValue = b64;
    const imgEl = document.getElementById('cust-photo-preview');
    if (imgEl) { imgEl.src = b64; imgEl.style.display = 'block'; imgEl.className = 'photo-preview'; }
    document.querySelectorAll('.theme-swatch').forEach(el => el.classList.remove('active'));
    _custUpdatePreview();
    const kb = Math.round(b64.length * 0.75 / 1024);
    showToast(`✅ Foto siap (~${kb}KB)`);
  }).catch(() => showToast('❌ Gagal load foto'));
}

function custLoadPngIcon(event) {
  const file = event.target.files[0];
  if (!file) return;
  if (file.size > 5 * 1024 * 1024) { showToast('❌ PNG max 5MB ya~'); return; }
  showToast('⏳ Compressing icon...');
  // Untuk icon: ukuran kecil, PNG transparent preserved pakai image/png
  compressImage(file, { maxW: 200, maxH: 200, quality: 0.85, mimeType: 'image/png' }).then(b64 => {
    window._custTheme.emojiOverride = '';       // clear emoji text
    window._custTheme.emojiPng = b64;           // store as separate key
    // Update preview
    const prevEmoji = document.getElementById('cust-prev-emoji');
    if (prevEmoji) {
      prevEmoji.innerHTML = `<img src="${b64}" style="width:${(window._custTheme.emojiSize||5)}rem;height:${(window._custTheme.emojiSize||5)}rem;object-fit:contain;animation:petBob 2s ease-in-out infinite">`;
    }
    const sp = document.getElementById('cust-size-preview');
    if (sp) sp.innerHTML = `<img src="${b64}" style="width:${(window._custTheme.emojiSize||5)}rem;height:${(window._custTheme.emojiSize||5)}rem;object-fit:contain">`;
    // Show thumbnail
    const thumb = document.getElementById('cust-png-thumb');
    if (thumb) { thumb.src = b64; thumb.style.display = 'inline-block'; }
    // Deactivate all emoji opts
    document.querySelectorAll('.emoji-opt').forEach(el => el.classList.remove('active'));
    const inp = document.getElementById('cust-emoji-input');
    if (inp) inp.value = '';
    const kb = Math.round(b64.length * 0.75 / 1024);
    showToast(`✅ Icon PNG siap (~${kb}KB)`);
  }).catch(() => showToast('❌ Gagal load PNG'));
}

function custSetEmoji(emoji) {
  window._custTheme.emojiOverride = emoji;
  window._custTheme.emojiPng = '';  // clear PNG icon when emoji dipilih
  document.querySelectorAll('.emoji-opt').forEach(el => el.classList.remove('active'));
  if (!emoji) {
    document.querySelector('.emoji-opt')?.classList.add('active');
  } else {
    document.querySelectorAll('.emoji-opt').forEach(el => {
      if (el.textContent.trim() === emoji) el.classList.add('active');
    });
  }
  const inp = document.getElementById('cust-emoji-input');
  if (inp && inp.value !== emoji) inp.value = emoji;
  // Reset PNG thumb
  const thumb = document.getElementById('cust-png-thumb');
  if (thumb) thumb.style.display = 'none';
  _custUpdatePreview();
}

function custClearPngIcon() {
  window._custTheme.emojiPng = '';
  const thumb = document.getElementById('cust-png-thumb');
  if (thumb) thumb.style.display = 'none';
  _custUpdatePreview();
  showToast('🗑️ PNG icon dihapus');
}

function custSetSize(val) {
  window._custTheme.emojiSize = val;
  _custUpdatePreview();
}

function custSetBtnColor(name) {
  window._custTheme.btnColor = name;
  document.querySelectorAll('.btn-color-opt').forEach((el,i) => {

async function useGachaItem(itemKey) {
  if (!activePet) { showToast('❌ Pilih pet dulu di tab 🏠!'); return; }
  const gi = GACHA_ITEMS[itemKey];
  if (!gi) return;
  const inv = getInv();
  if (!inv[itemKey] || inv[itemKey] <= 0) { showToast('❌ Item habis!'); return; }

  // If needs pet selection and multiple pets, ask first
  const needsPet = ['elixir','parfum_mewah','battle_steak'].includes(itemKey);
  if (needsPet && userPets.length > 1) {
    const btns = userPets.filter(p=>!p.is_missing).map((p,i) => {
      const pi = PETS[p.pet_type]||{emoji:'🐾'};
      return `<button class="btn btn-soft" onclick="doUseGachaItem('${itemKey}',${p.id})" style="margin-bottom:8px">${pi.emoji} ${p.name} (Lv.${calcLevel(p.xp||0)})</button>`;
    }).join('');
    showModal(`<div class="modal-box"><div class="modal-handle"></div>
      <div class="modal-title">${gi.emoji} ${gi.name}</div>
      <p style="text-align:center;color:var(--text-soft);font-size:0.85rem;margin-bottom:14px">Pakai ke pet mana?</p>
      ${btns}
      <button class="btn btn-soft" onclick="closeModal()">❌ Batal</button>
    </div>`);
    return;
  }
  await doUseGachaItem(itemKey, activePet.id);
}

async function doUseGachaItem(itemKey, petId) {
  closeModal();
  const gi = GACHA_ITEMS[itemKey];
  const inv = getInv();
  if (!inv[itemKey] || inv[itemKey] <= 0) { showToast('❌ Item habis!'); return; }

  inv[itemKey]--;
  if (inv[itemKey] <= 0) delete inv[itemKey];
  await saveInv(inv);

  let resultMsg = '';

  if (itemKey === 'mega_feast') {
    const activePets = userPets.filter(p => !p.is_missing);
    for (const p of activePets) {
      await savePet(p.id, { hunger: 0, last_decay: new Date().toISOString() });
    }
    resultMsg = `🍖 <b>Mega Feast!</b><br>Semua ${activePets.length} petmu sudah dikasih makan! Hunger → 0% ✅`;

  } else if (itemKey === 'elixir') {
    const freshRes = await db.from('pets').select('*').eq('id', petId).maybeSingle();
    const p = freshRes.data;
    if (!p) { showToast('❌ Pet tidak ditemukan!'); return; }
    await savePet(petId, { hunger: 0, happiness: 100, health: 100, last_decay: new Date().toISOString() });
    const pInfo = PETS[p.pet_type]||{emoji:'🐾'};
    resultMsg = `💊 <b>Elixir of Life!</b><br>${pInfo.emoji} <b>${p.name}</b><br>Hunger 0% | Happy 100% | HP 100% ✅`;

  } else if (itemKey === 'xp_booster') {
    // Save expiry in localStorage (client-side only for now, bot handles DB)
    const expiry = new Date(Date.now() + 24*3600000).toISOString();
    localStorage.setItem(`xp_boost_${USER_ID}`, expiry);
    resultMsg = `✨ <b>XP Booster aktif!</b><br>Semua XP x2 selama <b>24 jam</b>! 🚀`;

  } else if (itemKey === 'parfum_mewah') {
    const freshRes = await db.from('pets').select('id,name,pet_type').eq('id', petId).maybeSingle();
    const p = freshRes.data;
    if (!p) { showToast('❌ Pet tidak ditemukan!'); return; }
    const wangiUntil = new Date(Date.now() + 7*86400000).toISOString();
    await savePet(petId, { wangi_until: wangiUntil, is_dirty: false, last_bath: new Date().toISOString() });
    const pInfo = PETS[p.pet_type]||{emoji:'🐾'};
    resultMsg = `🧴 <b>Parfum Mewah!</b><br>${pInfo.emoji} <b>${p.name}</b> wangi selama <b>7 hari</b>! 🌸`;

  } else if (itemKey === 'battle_steak') {
    const freshRes = await db.from('pets').select('id,name,pet_type,battle_score_bonus').eq('id', petId).maybeSingle();
    const p = freshRes.data;
    if (!p) { showToast('❌ Pet tidak ditemukan!'); return; }
    const curBonus = p.battle_score_bonus || 0;
    await savePet(petId, { battle_score_bonus: curBonus + 15 });
    const pInfo = PETS[p.pet_type]||{emoji:'🐾'};
    resultMsg = `🥩 <b>Steak Petarung!</b><br>${pInfo.emoji} <b>${p.name}</b><br>Battle Score +15 permanen! Total bonus: <b>+${curBonus+15}</b> ⚔️`;
  }

  await loadPets();
  showModal(`<div class="modal-box"><div class="modal-handle"></div>
    <div style="text-align:center;margin-bottom:14px">
      <div style="font-size:3rem">${gi.emoji}</div>
    </div>
    <p style="text-align:center;margin-bottom:16px">${resultMsg}</p>
    <div class="btn-row">
      <button class="btn btn-lavender" onclick="closeModal();renderInventory()">🎒 Inventori</button>
      <button class="btn btn-mint" onclick="closeModal();renderHome();showScreen('home')">🐾 Pet</button>
    </div>
  </div>`);
  if (currentScreen === 'home') renderHome();
}


</script>
</body>
</html>
