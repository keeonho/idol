<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Carpet</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ==================== LIVESTOCK DATA ====================
const LIVESTOCK = {
  cow:       { name:"Sapi",         emoji:"🐄", price:1000, productName:"Susu",        productEmoji:"🥛", sellPrice:50,  intervalHours:8,  foodKey:"milk",      foodHunger:30, foodXp:8,  canFeedPet:true },
  chicken:   { name:"Ayam",         emoji:"🐔", price:500, productName:"Telur Ayam",  productEmoji:"🥚", sellPrice:30,  intervalHours:6,  foodKey:"egg",       foodHunger:20, foodXp:5,  canFeedPet:true },
  farm_duck: { name:"Bebek Ternak", emoji:"🦆", price:600, productName:"Telur Bebek", productEmoji:"🥚", sellPrice:40,  intervalHours:7,  foodKey:"duck_egg",  foodHunger:25, foodXp:6,  canFeedPet:true },
  goat:      { name:"Kambing",      emoji:"🐐", price:800, productName:"Susu Kambing",productEmoji:"🥛", sellPrice:60,  intervalHours:10, foodKey:"goat_milk", foodHunger:35, foodXp:10, canFeedPet:true },
  rabbit_f:  { name:"Kelinci Ternak",emoji:"🐇", price:1000, productName:"Bulu Kelinci",productEmoji:"🪶", sellPrice:70,  intervalHours:12, foodKey:null,        foodHunger:0,  foodXp:0,  canFeedPet:false },
  bee:       { name:"Lebah",        emoji:"🐝", price:1000, productName:"Madu",        productEmoji:"🍯", sellPrice:80,  intervalHours:12, foodKey:"honey",     foodHunger:40, foodXp:15, canFeedPet:true },
  pig:       { name:"Babi",         emoji:"🐷", price:1500, productName:"Trüffel",     productEmoji:"🍄", sellPrice:100, intervalHours:16, foodKey:null,        foodHunger:0,  foodXp:0,  canFeedPet:false },
  sheep:     { name:"Domba",        emoji:"🐑", price:800, productName:"Wol",         productEmoji:"🧶", sellPrice:65,  intervalHours:14, foodKey:null,        foodHunger:0,  foodXp:0,  canFeedPet:false },
};

const LIVESTOCK_FOOD = {
  milk:      { name:"Susu",         emoji:"🥛", hunger:30, xp:8,  happy:5  },
  egg:       { name:"Telur Ayam",   emoji:"🥚", hunger:20, xp:5,  happy:3  },
  duck_egg:  { name:"Telur Bebek",  emoji:"🥚", hunger:25, xp:6,  happy:3  },
  goat_milk: { name:"Susu Kambing", emoji:"🥛", hunger:35, xp:10, happy:8  },
  honey:     { name:"Madu",         emoji:"🍯", hunger:40, xp:15, happy:15 },
};

const BARN_UPGRADE_COST = 500;

// ==================== TERNAK STATE ====================
let userLivestocks = [];
let barnSlots = 1;

async function loadLivestocks() {
  try {
    const { data } = await db.from('livestocks')
      .select('*')
      .eq('owner_id', parseInt(USER_ID))
      .order('created_at', { ascending: true });
    userLivestocks = data || [];
    barnSlots = userData?.barn_slots || 1;
  } catch(e) { console.warn('loadLivestocks error:', e); userLivestocks = []; }
}

// ==================== TERNAK RENDER ====================
async function renderTernak() {
  await loadLivestocks();
  const el = document.getElementById('ternak-content');
  const koin = userData?.koin || 0;
  const usedSlots = userLivestocks.length;
  const now = Date.now();

  // Kandang info bar
  const slotIcons = Array.from({length: barnSlots}, (_, i) => {
    const isUsed = i < usedSlots;
    return `<div class="kandang-slot ${isUsed ? 'used' : 'free'}">${isUsed ? LIVESTOCK[userLivestocks[i]?.lt_type]?.emoji || '🐾' : '+'}</div>`;
  }).join('');

  const kandangHtml = `
    <div class="kandang-bar">
      <div>
        <div style="font-family:'Fredoka One',cursive;font-size:1rem">🏚️ Kandang</div>
        <div class="kandang-slots">${slotIcons}</div>
        <div style="font-size:0.75rem;color:var(--text-soft);margin-top:4px">${usedSlots}/${barnSlots} slot terpakai</div>
      </div>
      ${usedSlots >= barnSlots
        ? `<button class="buy-btn" onclick="doUpgradeBarn()" style="white-space:nowrap">+Slot ${BARN_UPGRADE_COST}🪙</button>`
        : `<div style="font-size:0.75rem;color:#5CAF8E;font-weight:800">${barnSlots - usedSlots} slot kosong</div>`
      }
    </div>`;

  // Ternak cards
  let cardsHtml = '';
  for (const lt of userLivestocks) {
    const info = LIVESTOCK[lt.lt_type] || {};
    const lastCollect = lt.last_collect ? new Date(lt.last_collect) : new Date(0);
    const hoursSince = (now - lastCollect.getTime()) / 3600000;
    const ready = hoursSince >= (info.intervalHours || 8);
    const itemsReady = ready ? Math.min(3, Math.floor(hoursSince / (info.intervalHours || 8))) : 0;

    let countdownTxt = '';
    if (!ready) {
      const nextMs = lastCollect.getTime() + (info.intervalHours * 3600000) - now;
      const h = Math.floor(nextMs / 3600000);
      const m = Math.floor((nextMs % 3600000) / 60000);
      countdownTxt = `${h > 0 ? h+'j ' : ''}${m}m lagi`;
    }

    cardsHtml += `
      <div class="ternak-card ${ready ? 'ready' : ''}" onclick="showTernakDetail(${lt.id})">
        ${ready ? `<div class="ternak-ready-badge">✅ ${itemsReady}x</div>` : ''}
        <span class="ternak-emoji">${info.emoji || '🐾'}</span>
        <div class="ternak-name">${lt.name}</div>
        <div style="font-size:0.7rem;color:var(--text-soft)">${info.name}</div>
        <div class="ternak-status" style="margin-top:6px;font-weight:700;color:${ready ? '#5CAF8E' : 'var(--text-soft)'}">
          ${ready ? `${info.productEmoji} ${itemsReady}x Siap Panen!` : `⏰ ${countdownTxt}`}
        </div>
        <div style="font-size:0.68rem;color:var(--text-soft);margin-top:2px">${info.productEmoji} ${info.productName} • ${info.sellPrice}🪙/item</div>
      </div>`;
  }

  // Empty slots
  if (usedSlots < barnSlots) {
    for (let i = 0; i < barnSlots - usedSlots; i++) {
      cardsHtml += `
        <div class="ternak-card empty" onclick="showBuyTernak()">
          <span class="ternak-emoji">➕</span>
          <div class="ternak-name" style="color:var(--text-soft)">Beli Ternak</div>
          <div class="ternak-status">500🪙 per ekor</div>
        </div>`;
    }
  }

  // Buy section
  const buyBtnHtml = usedSlots < barnSlots
    ? `<button class="btn btn-mint" onclick="showBuyTernak()" style="margin-bottom:10px">🐄 Beli Hewan Ternak</button>`
    : `<button class="btn btn-soft btn-disabled" style="margin-bottom:10px">🏚️ Kandang Penuh — Upgrade Dulu</button>`;

  el.innerHTML = `
    <div class="card" style="margin-bottom:14px;padding:14px 18px;display:flex;align-items:center;justify-content:space-between">
      <div>
        <div style="font-family:'Fredoka One',cursive;font-size:1.1rem">🐄 Hewan Ternak</div>
        <div style="font-size:0.8rem;color:var(--text-soft);margin-top:3px">Panen & jual hasil ternak~</div>
      </div>
      <div class="koin-badge">${koin.toLocaleString()} 🪙</div>
    </div>
    ${kandangHtml}
    ${userLivestocks.length > 0
      ? `<div class="section-label">🐾 Ternak Kamu</div><div class="ternak-grid">${cardsHtml}</div>`
      : `<div class="empty-state" style="padding:24px 20px">
          <span class="empty-state-emoji">🐄</span>
          <div class="empty-state-title">Belum punya ternak!</div>
          <p style="font-size:0.83rem;color:var(--text-soft);margin-bottom:16px">Beli hewan ternak untuk hasilkan susu, telur, madu, dan lainnya~</p>
        </div>`
    }
    <div style="margin-top:14px">
      ${buyBtnHtml}
      ${usedSlots >= barnSlots ? `<button class="btn btn-lavender" onclick="doUpgradeBarn()">🏚️ Upgrade Kandang (+1 Slot = ${BARN_UPGRADE_COST}🪙)</button>` : ''}
    </div>
  `;
}

// ==================== TERNAK DETAIL ====================
function showTernakDetail(ltId) {
  const lt = userLivestocks.find(l => l.id === ltId);
  if (!lt) return;
  const info = LIVESTOCK[lt.lt_type] || {};
  const now = Date.now();
  const lastCollect = lt.last_collect ? new Date(lt.last_collect) : new Date(0);
  const hoursSince = (now - lastCollect.getTime()) / 3600000;
  const ready = hoursSince >= (info.intervalHours || 8);
  const itemsReady = ready ? Math.min(3, Math.floor(hoursSince / (info.intervalHours || 8))) : 0;
  const earnSell = itemsReady * (info.sellPrice || 0);

  let countdownTxt = 'Siap dipanen!';
  if (!ready) {
    const nextMs = lastCollect.getTime() + (info.intervalHours * 3600000) - now;
    const h = Math.floor(nextMs / 3600000);
    const m = Math.floor((nextMs % 3600000) / 60000);
    countdownTxt = `${h > 0 ? h+' jam ' : ''}${m} menit lagi`;
  }

  const canFeed = info.canFeedPet && info.foodKey;
  const foodInfo = canFeed ? LIVESTOCK_FOOD[info.foodKey] : null;

  showModal(`
    <div class="modal-box">
      <div class="modal-handle"></div>
      <div style="text-align:center;margin-bottom:16px">
        <div style="font-size:3.5rem">${info.emoji}</div>
        <div class="modal-title">${lt.name}</div>
        <div style="font-size:0.82rem;color:var(--text-soft)">${info.name} • Produksi tiap ${info.intervalHours} jam</div>
      </div>
      <div style="background:rgba(201,184,240,0.15);border-radius:14px;padding:12px 14px;margin-bottom:16px">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div>
            <div style="font-size:0.78rem;color:var(--text-soft);font-weight:700">Status Panen</div>
            <div style="font-weight:800;color:${ready ? '#5CAF8E' : 'var(--text)'};margin-top:2px">${ready ? '✅ ' + itemsReady + 'x Siap!' : '⏰ ' + countdownTxt}</div>
          </div>
          <div style="text-align:right">
            <div style="font-size:0.78rem;color:var(--text-soft)">Produk</div>
            <div style="font-size:1.2rem">${info.productEmoji} ${info.productName}</div>
          </div>
        </div>
      </div>
      ${ready ? `
        <div style="margin-bottom:10px">
          <div style="font-size:0.82rem;color:var(--text-soft);font-weight:700;margin-bottom:8px;text-align:center">Mau diapain hasilnya?</div>
          <button class="btn btn-yellow" onclick="doHarvest(${ltId}, 'sell')" style="margin-bottom:8px">
            💰 Jual Semua — <b>${earnSell} 🪙</b>
          </button>
          ${canFeed ? `
            <button class="btn btn-mint" onclick="doHarvest(${ltId}, 'save')">
              🎒 Simpan ke Inventori — kasih ke pet nanti
            </button>
            <div style="font-size:0.72rem;color:var(--text-soft);text-align:center;margin-top:6px">
              ${foodInfo.emoji} ${foodInfo.name}: restore ${foodInfo.hunger} lapar + ${foodInfo.xp} XP ke pet
            </div>
          ` : ''}
        </div>
      ` : `<p style="text-align:center;color:var(--text-soft);font-size:0.85rem;margin-bottom:16px">Hasil panen tersedia ${countdownTxt}~</p>`}
      <button class="btn btn-soft" onclick="closeModal()">Tutup</button>
    </div>
  `);
}

// ==================== HARVEST ====================
async function doHarvest(ltId, mode) {
  const lt = userLivestocks.find(l => l.id === ltId);
  if (!lt) return;
  const info = LIVESTOCK[lt.lt_type] || {};
  const now = Date.now();
  const lastCollect = lt.last_collect ? new Date(lt.last_collect) : new Date(0);
  const hoursSince = (now - lastCollect.getTime()) / 3600000;
  if (hoursSince < (info.intervalHours || 8)) {
    showToast('⏰ Belum waktunya panen!'); closeModal(); return;
  }
  const itemsReady = Math.min(3, Math.floor(hoursSince / (info.intervalHours || 8)));
  if (itemsReady <= 0) { showToast('❌ Tidak ada yang dipanen!'); closeModal(); return; }

  // Update last_collect di DB
  await db.from('livestocks').update({ last_collect: new Date().toISOString() }).eq('id', ltId);

  if (mode === 'sell') {
    const earn = itemsReady * (info.sellPrice || 0);
    await saveUser({ koin: (userData.koin || 0) + earn });
    closeModal();
    showModal(`
      <div class="modal-box">
        <div class="modal-handle"></div>
        <div style="text-align:center">
          <div style="font-size:3.5rem;margin-bottom:12px">💰</div>
          <div class="modal-title">Terjual!</div>
          <p style="color:var(--text-soft);margin-bottom:16px">
            ${info.productEmoji} <b>${info.productName} x${itemsReady}</b> dijual<br>
            <b style="color:#9b73d4;font-size:1.2rem">+${earn} 🪙</b>
          </p>
          <button class="btn btn-lavender" onclick="closeModal();renderTernak()">Oke~</button>
        </div>
      </div>
    `);
  } else {
    // Simpan ke inventori
    const foodKey = info.foodKey;
    if (!foodKey) { showToast('❌ Hasil ini tidak bisa disimpan!'); return; }
    const inv = getInv();
    inv[foodKey] = (inv[foodKey] || 0) + itemsReady;
    await saveInv(inv);
    const foodInfo = LIVESTOCK_FOOD[foodKey] || {};
    closeModal();
    showModal(`
      <div class="modal-box">
        <div class="modal-handle"></div>
        <div style="text-align:center">
          <div style="font-size:3.5rem;margin-bottom:12px">🎒</div>
          <div class="modal-title">Disimpan!</div>
          <p style="color:var(--text-soft);margin-bottom:16px">
            ${info.productEmoji} <b>${info.productName} x${itemsReady}</b> masuk inventori!<br>
            <span style="font-size:0.82rem">Kasih ke petmu dari tab 🍽️ Makan</span>
          </p>
          <div style="background:rgba(181,234,215,0.2);border-radius:12px;padding:10px;margin-bottom:16px;font-size:0.82rem;color:var(--text-soft)">
            ${foodInfo.emoji} Restore: -${foodInfo.hunger} lapar | +${foodInfo.xp} XP | +${foodInfo.happy} senang per item
          </div>
          <button class="btn btn-lavender" onclick="closeModal();renderTernak()">Oke~</button>
        </div>
      </div>
    `);
  }

  // Update local state
  await loadLivestocks();
}

// ==================== BUY TERNAK ====================
function showBuyTernak() {
  const usedSlots = userLivestocks.length;
  if (usedSlots >= barnSlots) {
    showToast('🏚️ Kandang penuh! Upgrade dulu~'); return;
  }
  const koin = userData?.koin || 0;
  const rows = Object.entries(LIVESTOCK).map(([key, lt]) => {
    const canAfford = koin >= lt.price;
    return `
      <div class="shop-item" onclick="${canAfford ? `confirmBuyTernak('${key}')` : ''}" style="cursor:${canAfford ? 'pointer' : 'not-allowed'};opacity:${canAfford ? '1' : '0.5'}">
        <div class="shop-item-left">
          <div class="shop-item-emoji">${lt.emoji}</div>
          <div>
            <div class="shop-item-name">${lt.name}</div>
            <div class="shop-item-desc">${lt.productEmoji} ${lt.productName} tiap ${lt.intervalHours}j • Jual ${lt.sellPrice}🪙/item</div>
          </div>
        </div>
        <div style="display:flex;align-items:center">
          <span class="shop-item-price">${lt.price}🪙</span>
          ${canAfford ? `<button class="buy-btn" onclick="event.stopPropagation();confirmBuyTernak('${key}')">Beli</button>` : ''}
        </div>
      </div>`;
  }).join('');

  showModal(`
    <div class="modal-box">
      <div class="modal-handle"></div>
      <div class="modal-title">🐄 Beli Hewan Ternak</div>
      <div style="font-size:0.8rem;color:var(--text-soft);text-align:center;margin-bottom:14px">
        Slot: ${usedSlots}/${barnSlots} • Koin: ${koin.toLocaleString()}🪙
      </div>
      ${rows}
      <button class="btn btn-soft" style="margin-top:10px" onclick="closeModal()">❌ Batal</button>
    </div>
  `);
}

function confirmBuyTernak(ltType) {
  const lt = LIVESTOCK[ltType];
  closeModal();
  showModal(`
    <div class="modal-box">
      <div class="modal-handle"></div>
      <div style="text-align:center;margin-bottom:16px">
        <div style="font-size:3.5rem">${lt.emoji}</div>
        <div class="modal-title">Beli ${lt.name}!</div>
        <div style="font-size:0.85rem;color:#9b73d4;font-weight:800;margin-bottom:4px">${lt.price} 🪙</div>
        <div style="font-size:0.8rem;color:var(--text-soft)">Hasilkan ${lt.productEmoji} tiap ${lt.intervalHours} jam</div>
      </div>
      <input id="ternak-name-input" type="text" maxlength="20" placeholder="Nama ternak kamu (2-20 karakter)"
        style="width:100%;padding:14px 16px;border:1.5px solid rgba(201,184,240,0.4);border-radius:14px;
        font-family:'Nunito',sans-serif;font-size:1rem;color:var(--text);background:rgba(255,255,255,0.8);
        outline:none;margin-bottom:14px"
      />
      <button class="btn btn-mint" onclick="doBuyTernak('${ltType}')" style="margin-bottom:10px">🐄 Beli Sekarang!</button>
      <button class="btn btn-soft" onclick="closeModal()">❌ Batal</button>
    </div>
  `);
  setTimeout(() => document.getElementById('ternak-name-input')?.focus(), 300);
}


async function doBuyTernak(ltType) {
  const nameInput = document.getElementById('ternak-name-input');
  const name = nameInput?.value?.trim();
  if (!name || name.length < 2 || name.length > 20) {
    if (nameInput) nameInput.style.border = '1.5px solid #FF8FAB';
    showToast('⚠️ Nama harus 2–20 karakter!'); return;
  }
  const lt = LIVESTOCK[ltType];

  await loadUser();
  const koin = userData?.koin || 0;
  if (koin < lt.price) { showToast(`❌ Koin tidak cukup! Butuh ${lt.price} 🪙`); return; }

  const { data: insertData, error } = await db.from('livestocks').insert({
    owner_id:    parseInt(USER_ID),
    lt_type:     ltType,
    name:        name,
    last_collect: new Date(Date.now() - lt.intervalHours * 3600000).toISOString(),
    created_at:  new Date().toISOString(),
  }).select().single();

  if (error) {
    showToast(`❌ Error: ${error.message || error.code || JSON.stringify(error)}`); return;
  }

  await saveUser({ koin: koin - lt.price });

  closeModal();
  showModal(`
    <div class="modal-box">
      <div class="modal-handle"></div>
      <div style="text-align:center">
        <div style="font-size:3.5rem;margin-bottom:12px;animation:petBob 1s ease-in-out infinite">${lt.emoji}</div>
        <div class="modal-title">${name} berhasil dibeli! 🎉</div>
        <p style="color:var(--text-soft);margin-bottom:16px">
          ${lt.emoji} <b>${name}</b> (${lt.name}) sudah masuk kandang!<br>
          <span style="font-size:0.82rem">Hasilkan ${lt.productEmoji} tiap ${lt.intervalHours} jam~</span>
        </p>
        <button class="btn btn-lavender" onclick="closeModal();renderTernak()">Lihat Ternak~</button>
      </div>
    </div>
  `);
  await loadLivestocks();
}

async function doUpgradeBarn() {
  await loadUser();
  const koin = userData?.koin || 0;
  if (koin < BARN_UPGRADE_COST) {
    showToast(`❌ Koin tidak cukup! Butuh ${BARN_UPGRADE_COST} 🪙`); return;
  }
  showModal(`
    <div class="modal-box">
      <div class="modal-handle"></div>
      <div style="text-align:center">
        <div style="font-size:3rem;margin-bottom:12px">🏚️</div>
        <div class="modal-title">Upgrade Kandang?</div>
        <p style="color:var(--text-soft);margin-bottom:16px">
          Tambah <b>1 slot kandang</b> baru<br>
          <b style="color:#9b73d4">Biaya: ${BARN_UPGRADE_COST} 🪙</b>
        </p>
        <button class="btn btn-lavender" onclick="confirmUpgradeBarn()" style="margin-bottom:8px">✅ Upgrade!</button>
        <button class="btn btn-soft" onclick="closeModal()">❌ Batal</button>
      </div>
    </div>
  `);
}

async function confirmUpgradeBarn() {
  await loadUser();
  const koin = userData?.koin || 0;
  if (koin < BARN_UPGRADE_COST) { showToast('❌ Koin tidak cukup!'); return; }
  const newSlots = (userData?.barn_slots || 1) + 1;
  await saveUser({ koin: koin - BARN_UPGRADE_COST, barn_slots: newSlots });
  barnSlots = newSlots;
  closeModal();
  showToast(`🏚️ Kandang diupgrade! Sekarang ${newSlots} slot`);
  renderTernak();
}



</script>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --pink: #FFB5C8;
    --pink-soft: #FFE0EA;
    --lavender: #C9B8F0;
    --lavender-soft: #EDE8FF;
    --mint: #B5EAD7;
    --mint-soft: #E0F7EE;
    --peach: #FFDAB9;
    --peach-soft: #FFF0E0;
    --yellow: #FFF0A0;
    --cream: #FFFAF0;
    --text: #5a4a6a;
    --text-soft: #9b8aaa;
    --white: #ffffff;
    --shadow: 0 4px 20px rgba(180,140,200,0.15);
    --shadow-card: 0 8px 32px rgba(180,140,200,0.18);
    --radius: 20px;
    --radius-sm: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(135deg, #FFE8F0 0%, #EDE8FF 40%, #E0F7EE 100%);
    min-height: 100vh;
    color: var(--text);
    overflow-x: hidden;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding-bottom: 80px;
  }

  /* Floating bg blobs */
  .blob {
    position: fixed; border-radius: 50%; filter: blur(60px); opacity: 0.35; pointer-events: none; z-index: 0;
    animation: floatBlob 8s ease-in-out infinite;
  }
  .blob1 { width: 250px; height: 250px; background: var(--pink); top: -80px; left: -60px; animation-delay: 0s; }
  .blob2 { width: 200px; height: 200px; background: var(--lavender); bottom: 100px; right: -50px; animation-delay: 3s; }
  .blob3 { width: 180px; height: 180px; background: var(--mint); top: 40%; left: 30%; animation-delay: 5s; }
  @keyframes floatBlob { 0%,100%{transform:translateY(0) scale(1)} 50%{transform:translateY(-20px) scale(1.05)} }

  /* Header */
  .header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 1.5px solid rgba(201,184,240,0.3);
    padding: 14px 20px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .header-title { font-family: 'Fredoka One', cursive; font-size: 1.4rem; color: var(--text); letter-spacing: 0.5px; }
  .header-title span { color: #C9B8F0; }
  .koin-badge {
    background: linear-gradient(135deg, #FFD700, #FFA500);
    color: white; font-weight: 800; font-size: 0.85rem;
    padding: 5px 12px; border-radius: 50px;
    box-shadow: 0 2px 8px rgba(255,165,0,0.3);
    display: flex; align-items: center; gap: 4px;
  }

  /* Bottom Nav */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
    background: rgba(255,255,255,0.88);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 1.5px solid rgba(201,184,240,0.25);
    display: flex; justify-content: space-around; align-items: center;
    padding: 8px 0 max(8px, env(safe-area-inset-bottom));
  }
  .nav-item {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    padding: 6px 8px; border-radius: var(--radius-sm); cursor: pointer;
    transition: all 0.2s; position: relative;
    font-size: 0.62rem; font-weight: 700; color: var(--text-soft);
    border: none; background: none; flex: 1; min-width: 0;
  }
  .nav-item .nav-icon { font-size: 1.5rem; transition: transform 0.2s; }
  .nav-item.active { color: #9b73d4; }
  .nav-item.active .nav-icon { transform: scale(1.15); }
  .nav-item.active::before {
    content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
    width: 30px; height: 3px; background: linear-gradient(90deg, var(--lavender), var(--pink));
    border-radius: 0 0 4px 4px;
  }

  /* Screens */
  .screen { display: none; padding: 16px; position: relative; z-index: 1; }
  .screen.active { display: block; animation: fadeUp 0.3s ease; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

  /* Cards */
  .card {
    background: rgba(255,255,255,0.72);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-radius: var(--radius);
    padding: 18px;
    box-shadow: var(--shadow-card);
    border: 1.5px solid rgba(255,255,255,0.6);
    margin-bottom: 14px;
  }
  .card-title {
    font-family: 'Fredoka One', cursive;
    font-size: 1.1rem; color: var(--text); margin-bottom: 14px;
    display: flex; align-items: center; gap: 8px;
  }

  /* Pet Card */
  .pet-hero {
    background: linear-gradient(135deg, rgba(255,181,200,0.4), rgba(201,184,240,0.4));
    border-radius: var(--radius);
    padding: 22px 18px; text-align: center; margin-bottom: 14px;
    border: 1.5px solid rgba(255,255,255,0.7);
    box-shadow: var(--shadow-card);
    position: relative; overflow: hidden;
  }
  .pet-hero::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(circle at 70% 30%, rgba(255,255,255,0.5) 0%, transparent 60%);
  }
  .pet-emoji { font-size: 5rem; display: block; animation: petBob 2s ease-in-out infinite; }
  @keyframes petBob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
  .pet-name { font-family: 'Fredoka One', cursive; font-size: 1.6rem; color: var(--text); margin-top: 6px; }
  .pet-level { font-size: 0.85rem; color: var(--text-soft); font-weight: 700; margin-top: 2px; }
  .pet-mood { font-size: 1rem; margin-top: 8px; font-weight: 700; color: #9b73d4; }

  /* Stat bars */
  .stat-row { margin-bottom: 12px; }
  .stat-label { display: flex; justify-content: space-between; font-size: 0.82rem; font-weight: 700; margin-bottom: 5px; color: var(--text); }
  .stat-bar-bg { background: rgba(180,140,200,0.15); border-radius: 50px; height: 10px; overflow: hidden; }
  .stat-bar { height: 100%; border-radius: 50px; transition: width 0.6s ease; }
  .bar-hunger { background: linear-gradient(90deg, #FFB5C8, #FF8FAB); }
  .bar-happy  { background: linear-gradient(90deg, #B5EAD7, #7ECFB3); }
  .bar-health { background: linear-gradient(90deg, #C9B8F0, #A08FD8); }

  /* Buttons */
  .btn {
    display: block; width: 100%; padding: 14px 18px;
    border: none; border-radius: var(--radius-sm);
    font-family: 'Nunito', sans-serif; font-size: 0.95rem; font-weight: 800;
    cursor: pointer; transition: all 0.2s; text-align: center;
    box-shadow: 0 3px 12px rgba(0,0,0,0.08);
  }
  .btn:active { transform: scale(0.97); }
  .btn-pink { background: linear-gradient(135deg, #FFB5C8, #FF8FAB); color: white; }
  .btn-lavender { background: linear-gradient(135deg, #C9B8F0, #A08FD8); color: white; }
  .btn-mint { background: linear-gradient(135deg, #B5EAD7, #7ECFB3); color: white; }
  .btn-peach { background: linear-gradient(135deg, #FFDAB9, #FFB380); color: white; }
  .btn-yellow { background: linear-gradient(135deg, #FFF0A0, #FFD966); color: #7a6400; }
  .btn-soft { background: rgba(255,255,255,0.8); color: var(--text); border: 1.5px solid rgba(201,184,240,0.4); }
  .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .btn-disabled { opacity: 0.45; pointer-events: none; }

  /* Shop items */
  .shop-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px; background: rgba(255,255,255,0.65);
    border-radius: var(--radius-sm); margin-bottom: 10px;
    border: 1.5px solid rgba(255,255,255,0.7);
    box-shadow: 0 2px 10px rgba(180,140,200,0.1);
  }
  .shop-item-left { display: flex; align-items: center; gap: 12px; }
  .shop-item-emoji { font-size: 1.8rem; }
  .shop-item-name { font-weight: 800; font-size: 0.9rem; }
  .shop-item-desc { font-size: 0.75rem; color: var(--text-soft); margin-top: 2px; }
  .shop-item-price { font-weight: 800; font-size: 0.85rem; color: #9b73d4; white-space: nowrap; }
  .buy-btn {
    padding: 7px 14px; border: none; border-radius: 50px;
    background: linear-gradient(135deg, #C9B8F0, #A08FD8); color: white;
    font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 0.8rem;
    cursor: pointer; transition: all 0.15s; margin-left: 10px;
  }
  .buy-btn:active { transform: scale(0.94); }

  /* Inventory */
  .inv-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .inv-item {
    background: rgba(255,255,255,0.7); border-radius: var(--radius-sm);
    padding: 14px 10px; text-align: center;
    border: 1.5px solid rgba(255,255,255,0.6);
    box-shadow: 0 2px 10px rgba(180,140,200,0.1);
  }
  .inv-item-emoji { font-size: 2rem; display: block; }
  .inv-item-name { font-size: 0.72rem; font-weight: 700; margin-top: 4px; color: var(--text); }
  .inv-item-count { font-size: 0.8rem; font-weight: 800; color: #9b73d4; margin-top: 2px; }

  /* Games */
  .game-card {
    background: rgba(255,255,255,0.7); border-radius: var(--radius);
    padding: 20px; text-align: center; cursor: pointer;
    border: 1.5px solid rgba(255,255,255,0.7);
    box-shadow: var(--shadow); transition: all 0.2s;
    margin-bottom: 12px;
  }
  .game-card:active { transform: scale(0.97); }
  .game-card-emoji { font-size: 2.8rem; display: block; margin-bottom: 8px; }
  .game-card-name { font-family: 'Fredoka One', cursive; font-size: 1.1rem; color: var(--text); }
  .game-card-desc { font-size: 0.78rem; color: var(--text-soft); margin-top: 4px; }
  .game-card-quota { font-size: 0.75rem; font-weight: 800; margin-top: 6px; }
  .games-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(90,74,106,0.45);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    display: flex; align-items: flex-end; justify-content: center;
    padding: 0;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  .modal-box {
    background: linear-gradient(160deg, #FFF8FC, #F0EAFF);
    border-radius: 28px 28px 0 0;
    padding: 24px 20px 36px;
    width: 100%; max-width: 480px;
    max-height: 85vh;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    box-shadow: 0 -8px 40px rgba(150,100,200,0.2);
    animation: slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
  .modal-handle { width: 36px; height: 4px; background: rgba(180,140,200,0.3); border-radius: 50px; margin: 0 auto 20px; }
  .modal-title { font-family: 'Fredoka One', cursive; font-size: 1.3rem; text-align: center; color: var(--text); margin-bottom: 16px; }
  .modal-close { position: absolute; top: 16px; right: 20px; font-size: 1.4rem; cursor: pointer; background: none; border: none; color: var(--text-soft); }

  /* Quiz buttons */
  .quiz-btn {
    display: block; width: 100%; padding: 13px 16px; margin-bottom: 10px;
    background: rgba(255,255,255,0.8); border: 1.5px solid rgba(201,184,240,0.4);
    border-radius: var(--radius-sm); font-family: 'Nunito', sans-serif;
    font-weight: 700; font-size: 0.9rem; color: var(--text);
    cursor: pointer; text-align: left; transition: all 0.15s;
  }
  .quiz-btn:active { transform: scale(0.98); }
  .quiz-btn.correct { background: linear-gradient(135deg, #B5EAD7, #7ECFB3); color: white; border-color: transparent; }
  .quiz-btn.wrong   { background: linear-gradient(135deg, #FFB5C8, #FF8FAB); color: white; border-color: transparent; }

  /* Catch game */
  .catch-grid { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin: 16px 0; }
  .catch-btn {
    width: 56px; height: 56px; border: none; border-radius: 14px;
    font-size: 1.6rem; cursor: pointer; transition: all 0.15s;
    background: rgba(255,255,255,0.8); box-shadow: 0 2px 10px rgba(180,140,200,0.15);
  }
  .catch-btn:active { transform: scale(0.9); }

  /* Toast */
  .toast {
    position: fixed; top: 70px; left: 50%; transform: translateX(-50%) translateY(-20px);
    background: rgba(60,40,80,0.9); color: white;
    padding: 10px 20px; border-radius: 50px; font-weight: 700; font-size: 0.85rem;
    z-index: 300; white-space: nowrap; opacity: 0; transition: all 0.3s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Loading */
  .loading {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 60vh; gap: 16px;
  }
  .loading-emoji { font-size: 3rem; animation: petBob 1s ease-in-out infinite; }
  .loading-text { font-family: 'Fredoka One', cursive; font-size: 1.2rem; color: var(--text-soft); }

  /* Empty state */
  .empty-state { text-align: center; padding: 40px 20px; color: var(--text-soft); }
  .empty-state-emoji { font-size: 4rem; display: block; margin-bottom: 12px; }
  .empty-state-title { font-family: 'Fredoka One', cursive; font-size: 1.2rem; color: var(--text); margin-bottom: 8px; }

  /* Section label */
  .section-label { font-family: 'Fredoka One', cursive; font-size: 1rem; color: var(--text-soft); margin: 16px 0 10px; letter-spacing: 0.5px; }

  /* Partner info */
  .partner-tag {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(201,184,240,0.25); border-radius: 50px;
    padding: 5px 12px; font-size: 0.8rem; font-weight: 700; color: #9b73d4;
    margin-bottom: 14px;
  }

  /* Pet animated display */
  .pet-anim-wrap {
    position: relative; display: inline-block;
    width: 120px; height: 120px; margin: 0 auto 4px;
    animation: petBob 2s ease-in-out infinite;
  }
  .pet-anim-wrap img.pet-anim {
    width: 120px; height: 120px; object-fit: contain; display: block;
    filter: drop-shadow(0 4px 12px rgba(180,140,200,0.3));
  }
  .pet-badge {
    position: absolute; top: -8px; right: -4px;
    font-size: 1.4rem; line-height: 1;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.15));
  }
  .pet-acc { position: absolute; font-size: 1.8rem; line-height: 1; pointer-events: none; }
  .pet-acc.hat    { top: -14px; left: 50%; transform: translateX(-50%); }
  .pet-acc.glasses{ top: 38px;  left: 50%; transform: translateX(-50%); }
  .pet-acc.ribbon { top: -10px; right: 10px; }
  .pet-acc.flower { top: -10px; left: 10px; }
  .pet-acc.aura   { top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 5rem; opacity: 0.35; }
  .pet-emoji-fallback { font-size: 5rem; display: block; }

  /* Chat screen */
  .chat-wrap {
    display: flex; flex-direction: column; height: calc(100vh - 130px);
    position: relative; z-index: 1;
  }
  .chat-pet-header {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px; margin-bottom: 8px;
    background: rgba(255,255,255,0.72);
    backdrop-filter: blur(12px);
    border-radius: var(--radius);
    border: 1.5px solid rgba(255,255,255,0.6);
    box-shadow: var(--shadow);
    flex-shrink: 0;
  }
  .chat-pet-header.koi-header-chat {
    background: rgba(10,25,50,0.6) !important;
    border-color: rgba(100,200,255,0.2) !important;
  }
  .chat-messages {
    flex: 1; overflow-y: auto; padding: 8px 4px;
    display: flex; flex-direction: column; gap: 10px;
    -webkit-overflow-scrolling: touch;
  }
  .chat-bubble {
    max-width: 78%; padding: 10px 14px;
    border-radius: 18px; font-size: 0.88rem;
    line-height: 1.45; word-break: break-word;
    animation: fadeUp 0.25s ease;
  }
  .chat-bubble.user {
    align-self: flex-end;
    background: linear-gradient(135deg, #C9B8F0, #A08FD8);
    color: white; border-bottom-right-radius: 4px;
  }
  .chat-bubble.pet {
    align-self: flex-start;
    background: rgba(255,255,255,0.85);
    color: var(--text); border-bottom-left-radius: 4px;
    box-shadow: 0 2px 8px rgba(180,140,200,0.12);
    border: 1.5px solid rgba(201,184,240,0.2);
  }
  .chat-bubble.pet.koi-bubble {
    background: rgba(10,30,60,0.7) !important;
    color: #c0e8ff !important;
    border-color: rgba(100,200,255,0.2) !important;
  }
  .chat-bubble.typing {
    display: flex; gap: 5px; align-items: center; padding: 12px 16px;
  }
  .typing-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--text-soft);
    animation: typingBounce 1.2s ease-in-out infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typingBounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }
  .chat-input-wrap {
    display: flex; gap: 8px; padding: 8px 0 4px;
    flex-shrink: 0;
  }
  .chat-input {
    flex: 1; padding: 11px 14px;
    border: 1.5px solid rgba(201,184,240,0.4);
    border-radius: 50px; font-family: 'Nunito', sans-serif;
    font-size: 0.9rem; color: var(--text);
    background: rgba(255,255,255,0.85); outline: none;
  }
  .chat-input.koi-input {
    background: rgba(10,25,50,0.6) !important;
    color: #c0e8ff !important;
    border-color: rgba(100,200,255,0.3) !important;
  }
  .chat-send-btn {
    width: 44px; height: 44px; border: none; border-radius: 50%;
    background: linear-gradient(135deg, #C9B8F0, #A08FD8);
    color: white; font-size: 1.1rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.15s;
  }
  .chat-send-btn:active { transform: scale(0.92); }
  .chat-send-btn.koi-send {
    background: linear-gradient(135deg, #0095d9, #005fa3) !important;
  }
  .chat-quota {
    text-align: center; font-size: 0.75rem;
    color: var(--text-soft); font-weight: 700;
    padding: 2px 0 4px; flex-shrink: 0;
  }
  .chat-date-sep {
    text-align: center; font-size: 0.72rem;
    color: var(--text-soft); padding: 4px 0;
  }

  /* Cooldown badge */
  .cooldown-badge {
    display: inline-block; background: rgba(255,181,200,0.25);
    color: #d4558a; font-size: 0.78rem; font-weight: 800;
    padding: 4px 10px; border-radius: 50px; margin-top: 8px;
  }

  /* ===== KOI / OCEAN THEME ===== */
  .koi-theme body,
  body.koi-theme {
    background: linear-gradient(180deg, #0a1628 0%, #0d2744 30%, #0a3d5c 60%, #0d5078 100%) !important;
  }
  .koi-screen {
    background: linear-gradient(180deg, #0a1628 0%, #0d2744 30%, #0a3d5c 60%, #0d5078 100%);
    min-height: 100vh;
  }
  /* Bubble particles for koi screen */
  .koi-bubbles {
    position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
  }
  .bubble-particle {
    position: absolute; border-radius: 50%;
    background: rgba(100,200,255,0.15);
    border: 1px solid rgba(100,200,255,0.3);
    animation: bubbleRise linear infinite;
    bottom: -30px;
  }
  @keyframes bubbleRise {
    0%   { transform: translateY(0) scale(1); opacity: 0.6; }
    100% { transform: translateY(-110vh) scale(1.2); opacity: 0; }
  }
  /* Koi video container */
  .koi-video-wrap {
    width: 100%; aspect-ratio: 1/1; max-width: 340px;
    margin: 0 auto 16px; border-radius: 24px; overflow: hidden;
    position: relative;
    box-shadow: 0 0 40px rgba(0,180,255,0.3), 0 0 80px rgba(0,100,200,0.15);
    border: 1.5px solid rgba(100,200,255,0.2);
  }
  .koi-video-wrap video {
    width: 100%; height: 100%; object-fit: cover; display: block;
  }
  /* Koi card override */
  .koi-hero {
    background: rgba(10,30,60,0.6) !important;
    border: 1.5px solid rgba(100,200,255,0.2) !important;
    backdrop-filter: blur(16px);
  }
  .koi-hero .pet-name { color: #7dd8ff !important; }
  .koi-hero .pet-level { color: rgba(100,200,255,0.7) !important; }
  .koi-hero .pet-mood { color: #5bc8ff !important; }
  /* Koi stat bars */
  .koi-bar-hunger { background: linear-gradient(90deg, #ff6b9d, #ff4477) !important; }
  .koi-bar-happy  { background: linear-gradient(90deg, #5bc8ff, #0095d9) !important; }
  .koi-bar-health { background: linear-gradient(90deg, #7dd8ff, #0070b0) !important; }
  /* Koi card bg */
  .koi-card {
    background: rgba(10,25,50,0.55) !important;
    border: 1.5px solid rgba(100,200,255,0.15) !important;
    color: #c0e8ff !important;
  }
  .koi-card .card-title { color: #7dd8ff !important; }
  .koi-card .stat-label { color: #a0d8f0 !important; }
  /* Liquid glass buttons */
  .btn-liquid {
    position: relative; overflow: hidden;
    background: rgba(255,255,255,0.08) !important;
    border: 1px solid rgba(255,255,255,0.18) !important;
    color: #e0f4ff !important;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    box-shadow: 0 4px 24px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.15) !important;
    border-radius: 16px !important;
    font-weight: 800;
    transition: all 0.2s;
  }
  .btn-liquid::before {
    content: '';
    position: absolute; top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
    transition: left 0.4s;
  }
  .btn-liquid:active { transform: scale(0.97); background: rgba(255,255,255,0.14) !important; }
  .btn-liquid:hover::before { left: 100%; }
  .btn-liquid-blue {
    background: rgba(0,150,220,0.25) !important;
    border-color: rgba(100,200,255,0.35) !important;
    color: #c0eeff !important;
    box-shadow: 0 4px 24px rgba(0,100,200,0.3), inset 0 1px 0 rgba(100,200,255,0.2) !important;
  }
  .btn-liquid-red {
    background: rgba(220,50,80,0.25) !important;
    border-color: rgba(255,120,140,0.35) !important;
    color: #ffd0da !important;
  }
  /* Koi bottom nav */
  .koi-nav {
    background: rgba(5,15,35,0.7) !important;
    border-top-color: rgba(100,200,255,0.15) !important;
    backdrop-filter: blur(20px);
  }

let viewOthersAll = [];

async function showViewOthers(page = 0, query = viewOthersQuery) {
  viewOthersQuery = query;

  // Loading state
  if (page === 0 && viewOthersAll.length === 0) {
    showModal(`<div class="modal-box"><div class="modal-handle"></div>
      <div style="text-align:center;padding:20px">
        <div style="font-size:2.5rem;animation:petBob 1s ease-in-out infinite">🐾</div>
        <div style="font-family:'Fredoka One',cursive;font-size:1.1rem;color:var(--text-soft);margin-top:8px">Loading...</div>
      </div>
    </div>`);

    // Fetch semua dengan pagination loop buat hindari limit 1000
    viewOthersAll = [];
    let offset = 0;
    const batchSize = 1000;
    while (true) {
      const { data } = await db.from('pets')
        .select('id,pet_type,name,hunger,happiness,health,xp,owner1_id,owner2_id')
        .not('owner1_id', 'eq', USER_ID)
        .not('owner2_id', 'eq', USER_ID)
        .order('created_at', { ascending: false })
        .range(offset, offset + batchSize - 1);
      if (!data || data.length === 0) break;
      viewOthersAll.push(...data);
      if (data.length < batchSize) break;
      offset += batchSize;
    }
  }

  // Filter by search query
  if (query.trim()) {
    const q = query.trim().toLowerCase();
    viewOthersFiltered = viewOthersAll.filter(p =>
      p.name.toLowerCase().includes(q) ||
      (PETS[p.pet_type]?.name || '').toLowerCase().includes(q)
    );
  } else {
    viewOthersFiltered = viewOthersAll;
  }

  viewOthersPage = page;
  const total = viewOthersFiltered.length;
  const totalPages = Math.max(1, Math.ceil(total / VIEW_OTHERS_PAGE_SIZE));
  const safePage = Math.min(page, totalPages - 1);
  const slice = viewOthersFiltered.slice(safePage * VIEW_OTHERS_PAGE_SIZE, (safePage+1) * VIEW_OTHERS_PAGE_SIZE);

  const rows = slice.length === 0
    ? `<div style="text-align:center;padding:20px;color:var(--text-soft)">Tidak ada pet yang ditemukan~</div>`
    : slice.map(p => {
        const info = PETS[p.pet_type] || {emoji:'🐾',name:'?'};
        const lv = calcLevel(p.xp||0);
        const h = p.hunger??0;
        const hc = h>70?'🔴':h>40?'🟡':'🟢';
        // Escape nama untuk aman di onclick
        const safeName = (p.name||'').replace(/'/g,"\\'").replace(/"/g,'&quot;');
        const safeEmoji = (info.emoji||'🐾');
        return `<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(201,184,240,0.15)">
          <div style="display:flex;align-items:center;gap:10px">
            <span style="font-size:1.6rem">${safeEmoji}</span>
            <div>
              <div style="font-weight:800;font-size:0.9rem">${p.name}</div>
              <div style="font-size:0.75rem;color:var(--text-soft)">Lv.${lv} • ${info.name} • ${hc} Lapar ${h}%</div>
            </div>
          </div>
          <button onclick="doFeedOther(${p.id},'${safeName}','${safeEmoji}',${p.owner1_id||'null'},${p.owner2_id||'null'})"
            style="padding:6px 12px;border:none;border-radius:50px;background:linear-gradient(135deg,#C9B8F0,#A08FD8);color:white;font-family:'Nunito',sans-serif;font-weight:800;font-size:0.78rem;cursor:pointer;white-space:nowrap">
            🍽️ Kasih
          </button>
        </div>`;
      }).join('');

  const navBtns = totalPages > 1 ? `
    <div style="display:flex;align-items:center;gap:8px;margin-top:14px">
      <button class="btn btn-soft" style="flex:1;padding:10px" onclick="showViewOthers(${safePage-1},'${query.replace(/'/g,"\\'")}')" ${safePage===0?'disabled style="opacity:0.4;pointer-events:none"':''}>← Prev</button>
      <span style="font-size:0.8rem;color:var(--text-soft);white-space:nowrap">${safePage+1} / ${totalPages}</span>
      <button class="btn btn-soft" style="flex:1;padding:10px" onclick="showViewOthers(${safePage+1},'${query.replace(/'/g,"\\'")}')" ${safePage>=totalPages-1?'disabled style="opacity:0.4;pointer-events:none"':''}>Next →</button>
    </div>` : '';

  const searchBar = `
    <div style="display:flex;gap:8px;margin-bottom:14px">
      <input id="pet-search-input" type="text" placeholder="🔍 Cari nama pet atau jenis..."
        value="${query.replace(/"/g,'&quot;')}"
        oninput="viewOthersQuery=this.value"
        style="flex:1;padding:10px 14px;border:1.5px solid rgba(201,184,240,0.4);border-radius:12px;
        font-family:'Nunito',sans-serif;font-size:0.88rem;color:var(--text);background:rgba(255,255,255,0.8);outline:none"/>
      <button onclick="showViewOthers(0,document.getElementById('pet-search-input').value)"
        style="padding:10px 16px;border:none;border-radius:12px;background:linear-gradient(135deg,#C9B8F0,#A08FD8);color:white;font-family:'Nunito',sans-serif;font-weight:800;font-size:0.85rem;cursor:pointer">
        Cari
      </button>
    </div>`;

  showModal(`<div class="modal-box">
    <div class="modal-handle"></div>
    <div class="modal-title">👀 Pet Orang Lain</div>
    ${searchBar}
    <div style="font-size:0.78rem;color:var(--text-soft);margin-bottom:10px;text-align:center">
      ${query ? `Hasil: <b>${total}</b> pet` : `Total: <b>${total}</b> pet`} • Kasih makan pakai inventorimu
    </div>
    ${rows}
    ${navBtns}
    <button class="btn btn-soft" style="margin-top:14px" onclick="closeModal();viewOthersAll=[]">Tutup</button>
  </div>`);

  // Autofocus search
  setTimeout(() => document.getElementById('pet-search-input')?.focus(), 200);
}

async function doFeedOther(petId, petName, petEmoji, owner1Id, owner2Id) {
  const inv = getInv();
  const feedItems = Object.entries(FOOD_SHOP).filter(([k,v]) => v.hunger && (inv[k]||0) > 0);
  if (!feedItems.length) {
    showToast('❌ Inventori makanan kosong!');
    return;
  }
  const btns = feedItems.map(([k,v]) =>
    `<button class="btn btn-soft" style="margin-bottom:8px"
      onclick="confirmFeedOther(${petId},'${k}','${petName.replace(/'/g,"\\'")}','${petEmoji}',${owner1Id||'null'},${owner2Id||'null'})"
    >${v.emoji} ${v.name} x${inv[k]}</button>`
  ).join('');
  showModal(`<div class="modal-box">
    <div class="modal-handle"></div>
    <div style="text-align:center;font-size:2.5rem;margin-bottom:8px">${petEmoji}</div>
    <div class="modal-title">Kasih makan ${petName}?</div>
    <p style="text-align:center;font-size:0.82rem;color:var(--text-soft);margin-bottom:14px">Owner akan dapat notifikasi~</p>
    ${btns}

  </div>`);
}

async function confirmFeedOther(petId, itemKey, petName, petEmoji, owner1Id, owner2Id) {
  const inv = getInv();
  if (!inv[itemKey] || inv[itemKey] <= 0) { showToast('❌ Stok habis!'); return; }
  const food = FOOD_SHOP[itemKey];

  // Kurangi inventori
  inv[itemKey]--;
  if (inv[itemKey] === 0) delete inv[itemKey];
  await saveInv(inv);

  // Update stats pet
  const { data: pets } = await db.from('pets')
    .select('hunger,happiness')
    .eq('id', petId);
  if (pets && pets[0]) {
    const p = pets[0];
    await db.from('pets').update({
      hunger:    Math.max(0,   (p.hunger??50)    - (food.hunger||0)),
      happiness: Math.min(100, (p.happiness??80) + (food.happy||5)),
    }).eq('id', petId);
  }

  // Kirim notif ke owner via bot
  const senderName = window.Telegram?.WebApp?.initDataUnsafe?.user?.first_name || 'Seseorang';
  const notifMsg =
    `🍽️ <b>${senderName}</b> kasih makan ${petEmoji} <b>${petName}</b> kamu!\n` +
    `${food.emoji} ${food.name} — Lapar -${food.hunger||0}\n\n` +
    `<i>Ada yang peduli sama petmu~ 💕</i>`;

  for (const oid of [owner1Id, owner2Id]) {
    if (oid && oid !== USER_ID) {
      await sendTgNotif(oid, notifMsg).catch(() => {});
    }
  }

  closeModal();
  showToast(`🍽️ ${petEmoji} ${petName} dikasih makan!`);

  // Refresh data cached biar search up to date
  const idx = viewOthersAll.findIndex(p => p.id === petId);
  if (idx !== -1 && pets?.[0]) {
    viewOthersAll[idx].hunger = Math.max(0, (pets[0].hunger??50) - (food.hunger||0));
  }
}

function gachaRollItem(table) {
  const total = table.reduce((s,t) => s + t[1], 0);
  let r = Math.floor(Math.random() * total) + 1;
  for (const [key, w] of table) {
    r -= w;
    if (r <= 0) return key;
  }
  return table[table.length-1][0];
}

async function loadUser() {
  try {
    const { data } = await db.from('users').select('*').eq('user_id', USER_ID).maybeSingle();
    userData = data || null;
    if (userData) updateKoinBadge(userData.koin || 0);
  } catch(e) { console.warn('loadUser error:', e); userData = null; }
}

async function loadPets() {
  try {
    // Fix: query terpisah untuk owner1 dan owner2 karena .or() di Supabase JS v2
    // kadang tidak reliable untuk owner2_id (pet yang kamu join sebagai partner)
    const uid = String(USER_ID);
    const [res1, res2] = await Promise.all([
      db.from('pets').select('*').eq('owner1_id', uid).order('created_at', { ascending: false }),
      db.from('pets').select('*').eq('owner2_id', uid).order('created_at', { ascending: false }),
    ]);
    const pets1 = res1.data || [];
    const pets2 = res2.data || [];
    // Merge & deduplicate berdasarkan id
    const seen = new Set();
    const merged = [];
    for (const p of [...pets1, ...pets2]) {
      if (!seen.has(p.id)) { seen.add(p.id); merged.push(p); }
    }
    // Sort by created_at descending
    merged.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
    userPets = merged;

    if (activePet) {
      // Update data fresh untuk activePet yang sedang dipilih
      const fresh = userPets.find(p => p.id === activePet.id);
      activePet = fresh || userPets[0] || null;
    } else {
      // Coba ingat pet terakhir yang dipilih
      const lastPetId = parseInt(sessionStorage.getItem(`lastPet_${USER_ID}`));
      if (lastPetId) {
        const remembered = userPets.find(p => p.id === lastPetId);
        activePet = remembered || userPets[0] || null;
      } else {
        activePet = userPets[0] || null;
      }
    }
  } catch(e) { console.warn('loadPets error:', e); userPets = []; }
}

async function saveUser(updates) {
  // Kalau ada update koin, selalu refresh dulu dari DB supaya tidak overwrite data bot
  if (updates.koin !== undefined) {
    const { data: fresh } = await db.from('users').select('koin').eq('user_id', USER_ID).maybeSingle();
    if (fresh && fresh.koin !== undefined && fresh.koin !== (userData?.koin || 0)) {
      // Koin di DB berbeda dari cache lokal — pakai DB sebagai source of truth
      // Hitung delta yang mau diubah lalu apply ke nilai fresh
      const delta = updates.koin - (userData?.koin || 0);
      updates = { ...updates, koin: Math.max(0, fresh.koin + delta) };
      if (userData) userData.koin = fresh.koin; // sync dulu
    }
  }
  await db.from('users').update(updates).eq('user_id', USER_ID);
  Object.assign(userData, updates);
  if (updates.koin !== undefined) updateKoinBadge(updates.koin);
}

async function savePet(petId, updates) {
  await db.from('pets').update(updates).eq('id', petId);
  const idx = userPets.findIndex(p => p.id === petId);
  if (idx !== -1) Object.assign(userPets[idx], updates);
  if (activePet?.id === petId) Object.assign(activePet, updates);
}

  const h = pet.hunger ?? 30, hp = pet.happiness ?? 80, hl = pet.health ?? 100;

  if (pet.is_sleeping) return "😴 Lagi tidur~";
  if (hl < 30)   return "😷 Sakit";
  if (h > 80)    return "😩 Lapar banget!";
  if (pc >= 3)   return "💩 Kandang penuh poop! Tolong bersihkan~";
  if (pc >= 1)   return `💩 Ada ${pc === 1 ? 'poop' : pc+'x poop'}, bersihkan yuk!`;
  if (dirty && pet.pet_type !== 'koi') return "🛁 Bau! Pengen mandi~";

  if (hp > 80)   return "🥰 Senang banget!";

  return "😊 Baik-baik aja";
}

// ==================== CLIENT-SIDE DECAY (sinkron dgn bot) ====================
// Identik dengan decay_pet_stats di pets.py
// PENTING: hanya dipakai untuk display saja - tidak write ke DB
function applyDecayToActivePet(pet) {
  if (!pet || !pet.last_decay) return pet;

  const now = new Date();
  const lastDecay = new Date(pet.last_decay);
  const hours = (now - lastDecay) / 3600000;

  // Kalau baru saja ada aksi (< 2 menit), skip decay supaya tidak override hasil aksi
  if (hours < 0.033) return pet;

  const p = { ...pet };

  if (p.is_sleeping) {
    p.health    = Math.min(100, (p.health    ?? 100) + Math.floor(hours * 3));
    p.happiness = Math.min(100, (p.happiness ?? 80)  + Math.floor(hours * 2));
  } else {
    // Identik rumus Python: per 3 jam naik 10
    const hungerAdd = Math.min(100, Math.floor(hours / 3 * 10));
    const happySub  = Math.min(100, Math.floor(hours * 3));
    p.hunger    = Math.min(100, (p.hunger    ?? 0)  + hungerAdd);
    p.happiness = Math.max(0,   (p.happiness ?? 80) - happySub);
    if (p.hunger >= 70) {
      p.health = Math.max(0, (p.health ?? 100) - Math.floor(hours * 5));
    }
    if (p.happiness <= 10) {
      p.health = Math.max(0, (p.health ?? 100) - Math.floor(hours * 2));
    }
  }

  // Poop penalty
  const poopCount = p.poop_count || 0;
  if (poopCount > 0) {
    p.happiness = Math.max(0, p.happiness - Math.floor(poopCount * 5 * hours));
  }

  // Bath penalty (koi tidak perlu mandi — hidup di air)
  if (p.pet_type !== 'koi') {
    const bathRequired = p.soap_premium_active ? 48 : 24;
    if (p.last_bath) {
      const hoursSinceBath = (now - new Date(p.last_bath)) / 3600000;
      if (hoursSinceBath > bathRequired) {
        const dirtyHours = hoursSinceBath - bathRequired;
        p.happiness = Math.max(0, p.happiness - Math.floor(dirtyHours * 3));
        p.health    = Math.max(0, p.health    - Math.floor(dirtyHours * 2));
        p.is_dirty  = true;
      }
    } else {
      p.is_dirty = true;
    }
  } else {
    p.is_dirty = false; // koi selalu bersih
  }

  return p;
}

      </div>
      <div class="pet-name">${pet.name}</div>

      <div class="pet-mood">${petMood(pet)}</div>
      ${quoteHtml}
      <button onclick="showRenamePet()" style="margin-top:8px;background:rgba(255,255,255,0.4);border:1.5px solid rgba(255,255,255,0.6);border-radius:50px;padding:5px 14px;font-family:'Nunito',sans-serif;font-size:0.78rem;font-weight:800;color:var(--text);cursor:pointer">✏️ Ganti Nama</button>
      ${cooldownTxt}
    </div>
    ${sickWarn}${poopWarn}${dirtyWarn}
    <div class="card">
      <div class="card-title">📊 Status</div>

        <div class="stat-label"><span>🍖 Lapar</span><span>${hunger}%</span></div>

      </div>

        <div class="stat-label"><span>😊 Senang</span><span>${happy}%</span></div>
        <div class="stat-bar-bg"><div class="stat-bar bar-happy" style="width:${happy}%"></div></div>
      </div>
      <div class="stat-row" style="margin-bottom:0">
        <div class="stat-label"><span>💖 Sehat</span><span>${health}%</span></div>

    ${petLv>=15?`<button class="btn btn-soft" onclick="showGiftMenu('partner')" style="margin-bottom:10px">🎁 Gift ke Partner</button>`:''}
    ${petLv>=20?`<button class="btn btn-soft" onclick="showGiftMenu('other')" style="margin-bottom:10px">🎁 Gift ke Orang Lain</button>`:''}
    ${petLv>=30?`<button class="btn btn-soft" onclick="showViewOthers()" style="margin-bottom:10px">👀 Lihat Pet Orang Lain</button>`:''}

    ${pet.is_married?await renderMarriedBarn(pet):''}

// ==================== HELPER RENDERS ====================
function renderWorkBtn(pet) {
  const workUntil = pet.work_until ? new Date(pet.work_until) : null;
  const isWorking = workUntil && workUntil > new Date();
  if (isWorking) {
    const remMs = workUntil - Date.now();
    const h = Math.floor(remMs/3600000), m = Math.floor((remMs%3600000)/60000);
    return `<div style="background:rgba(255,200,100,0.15);border-radius:14px;padding:12px 14px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between">
      <div><div style="font-weight:800;font-size:0.88rem">💼 Sedang Kerja...</div>
      <div style="font-size:0.75rem;color:var(--text-soft)">Selesai dalam ${h>0?h+'j ':''} ${m}m</div></div>
      <span style="font-size:0.8rem;color:#c47a00;font-weight:700">+${WORK_REWARD_PER_OWNER}🪙</span>
    </div>`;
  }
  return `<button class="btn btn-soft" onclick="showWorkMenu()" style="margin-bottom:10px">💼 Kirim Kerja (Lv.${LEVEL_WORK}+)</button>`;
}

function renderChildBtn(pet) {
  if (pet.child_pet_id) {
    return `<button class="btn btn-soft" onclick="showChildInfo()" style="margin-bottom:10px">👶 Lihat Anak Pet</button>`;
  }
  return `<button class="btn btn-soft" onclick="showCreateChild()" style="margin-bottom:10px">👶 Punya Anak (Lv.${LEVEL_CHILD}+)</button>`;
}

function renderBadgeDisplay(pet) {
  const badge = PET_BADGES[pet.pet_type] || '🎖️ Badge Kehormatan';
  return `<div style="background:rgba(201,184,240,0.2);border-radius:14px;padding:10px 14px;margin-bottom:10px;text-align:center;font-size:0.82rem;font-weight:800;color:#9b73d4">${badge}</div>`;
}

function renderLv50AccBtn(pet) {
  const acc = SPECIAL_ACC_LV50[pet.pet_type];
  if (!acc) return '';
  const isEquipped = pet.accessory_key === `lv50_${pet.pet_type}`;
  if (isEquipped) return `<div style="background:rgba(255,215,0,0.1);border-radius:14px;padding:10px 14px;margin-bottom:10px;text-align:center;font-size:0.82rem;font-weight:800;color:#c47a00">🌟 ${acc.emoji} ${acc.name} — Terpasang!</div>`;
  return `<button class="btn btn-soft" onclick="doEquipLv50Acc()" style="margin-bottom:10px;border:2px solid gold">🌟 Equip ${acc.emoji} ${acc.name} (Lv.50)</button>`;
}

async function renderMarriedBarn(pet) {
  // Tampilkan "kandang bersama" dengan partner pet
  const partnerPetId = pet.married_to_pet_id;
  if (!partnerPetId) return '';
  let partnerPet = userPets.find(p => p.id === partnerPetId);
  // Partner pet kemungkinan besar milik orang lain — fetch dari DB
  if (!partnerPet) {
    try {
      const { data } = await db.from('pets').select('id,name,pet_type,xp').eq('id', partnerPetId).maybeSingle();
      partnerPet = data || null;
    } catch(e) { partnerPet = null; }
  }
  const partnerInfo = partnerPet ? (PETS[partnerPet.pet_type] || {emoji:'🐾',name:'?'}) : null;
  if (!partnerInfo || !partnerPet) {
    return `<div style="background:rgba(255,181,200,0.15);border-radius:14px;padding:12px 14px;margin-bottom:10px;font-size:0.82rem;text-align:center;color:var(--text-soft)">💍 Tinggal bersama pasangannya~</div>`;
  }
  const myInfo = PETS[pet.pet_type] || {emoji:'🐾'};
  return `<div style="background:rgba(255,181,200,0.15);border-radius:14px;padding:12px 14px;margin-bottom:10px">
    <div style="font-size:0.78rem;font-weight:800;color:#d4556a;margin-bottom:8px">🏠 Kandang Bersama</div>
    <div style="display:flex;align-items:center;justify-content:center;gap:16px">
      <div style="text-align:center">
        <div style="font-size:2rem">${myInfo.emoji}</div>
        <div style="font-size:0.75rem;font-weight:700">${pet.name}</div>
        <div style="font-size:0.68rem;color:var(--text-soft)">Lv.${calcLevel(pet.xp||0)}</div>
      </div>
      <div style="font-size:1.2rem">💕</div>
      <div style="text-align:center">
        <div style="font-size:2rem">${partnerInfo.emoji}</div>
        <div style="font-size:0.75rem;font-weight:700">${partnerPet.name}</div>
        <div style="font-size:0.68rem;color:var(--text-soft)">Lv.${calcLevel(partnerPet.xp||0)}</div>
      </div>
    </div>
  </div>`;
}

function showRenamePet() {
  if (!activePet) return;
  const info = PETS[activePet.pet_type] || { emoji:'🐾' };
  const safeCurrentName = activePet.name.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  showModal(`
    <div class="modal-box">
      <div class="modal-handle"></div>
      <div style="text-align:center;margin-bottom:16px">
        <div style="font-size:3rem">${info.emoji}</div>
        <div class="modal-title">Ganti Nama Pet</div>
        <p style="font-size:0.85rem;color:var(--text-soft)">Nama sekarang: <b>${safeCurrentName}</b></p>
      </div>
      <input id="rename-input" type="text" maxlength="20" placeholder="Nama baru (2-20 karakter)"
        style="width:100%;padding:14px 16px;border:1.5px solid rgba(201,184,240,0.4);border-radius:14px;
        font-family:'Nunito',sans-serif;font-size:1rem;color:var(--text);background:rgba(255,255,255,0.8);
        outline:none;margin-bottom:14px"
      />
      <button class="btn btn-lavender" onclick="confirmRenamePet()" style="margin-bottom:10px">✏️ Simpan Nama</button>
      <button class="btn btn-soft" onclick="closeModal()">❌ Batal</button>
    </div>
  `);
  setTimeout(() => {
    const inp = document.getElementById('rename-input');
    if (inp) { inp.value = activePet.name; inp.focus(); inp.select(); }
  }, 300);
}

async function confirmRenamePet() {
  const inp = document.getElementById('rename-input');
  const newName = inp?.value?.trim();
  if (!newName || newName.length < 2 || newName.length > 20) {
    if (inp) inp.style.border = '1.5px solid #FF8FAB';
    showToast('⚠️ Nama harus 2–20 karakter!');
    return;
  }
  if (newName === activePet.name) { closeModal(); return; }
  const oldName = activePet.name;
  await savePet(activePet.id, { name: newName });
  closeModal();
  showToast(`✅ Nama berhasil diganti jadi "${newName}"!`);
  renderHome();
  // Kirim notif ke partner
  const partnerId = getPartnerIdOf(activePet);
  if (partnerId) {
    const info = PETS[activePet.pet_type] || { emoji:'🐾' };
    await sendTgNotif(partnerId,
      `✏️ Partner kamu mengganti nama pet!\n${info.emoji} <b>${oldName}</b> → <b>${newName}</b>`
    );
  }
}

async function selectPet(idx) {
  await loadPets();
  activePet = userPets[idx] || userPets[0];
  // Ingat pet yang dipilih
  if (activePet) sessionStorage.setItem(`lastPet_${USER_ID}`, activePet.id);
  renderHome();
}

async function refreshPet() {
  showToast('🔄 Refreshing...');
  await loadPets();
  renderHome();
}

// ==================== PLAY ====================
async function doPlay() {
  if (!activePet) return;
  const lastPlayed = activePet.last_played ? new Date(activePet.last_played) : new Date(0);
  const elapsedH = (Date.now() - lastPlayed.getTime()) / 3600000;
  if (elapsedH < 5) { showToast('⏰ Masih cooldown 5 jam!'); return; }
  if ((activePet.hunger||0) >= 70) { showToast('⚠️ Terlalu lapar untuk main! Kasih makan dulu~'); return; }

  const gain = rand(15,30), xpg = rand(5,15);
  const newHappy  = Math.min(100, (activePet.happiness ?? 80) + gain);
  const newHunger = Math.min(100, (activePet.hunger ?? 0) + 5);
  const oldXp     = activePet.xp || 0;
  const newXp     = oldXp + xpg;
  const oldLv     = calcLevel(oldXp);
  const newLv     = calcLevel(newXp);

  await savePet(activePet.id, {
    happiness: newHappy, hunger: newHunger, xp: newXp,
    level: newLv, last_played: new Date().toISOString()
  });

  const acts  = ["main bola ⚽","kejar-kejaran 🏃","main puzzle 🧩","tiduran bareng 😴","lomba lompat 🐸"];
  const act   = acts[rand(0,acts.length-1)];
  const lvTxt = newLv > oldLv ? `\n✨ LEVEL UP! Lv.${newLv}!` : '';

  // Cek level up — kirim notif ke kedua owner
  await checkLevelUp(activePet, oldXp, newXp);

  showModal(`
    <div class="modal-box">
      <div class="modal-handle"></div>
      <div style="text-align:center">
        <div style="font-size:3.5rem;margin-bottom:12px;animation:petBob 1s ease-in-out infinite">${PETS[activePet.pet_type]?.emoji||'🐾'}</div>
        <div class="modal-title">Seru banget! 🎉</div>
        <p style="font-size:0.95rem;color:var(--text-soft);margin-bottom:16px"><b>${activePet.name}</b> diajak <b>${act}</b>!</p>
        <div style="display:flex;justify-content:center;gap:12px;margin-bottom:20px">
          <div style="background:rgba(181,234,215,0.3);padding:10px 16px;border-radius:12px;font-weight:800;color:#5CAF8E">😊 +${gain}</div>
          <div style="background:rgba(201,184,240,0.3);padding:10px 16px;border-radius:12px;font-weight:800;color:#9b73d4">✨ +${xpg} XP</div>
        </div>
        ${lvTxt ? `<div style="background:linear-gradient(135deg,rgba(255,181,200,0.3),rgba(201,184,240,0.3));padding:12px;border-radius:14px;font-weight:800;color:var(--text);margin-bottom:16px">${lvTxt}</div>` : ''}
        <p style="font-size:0.78rem;color:var(--text-soft);margin-bottom:16px">Bisa ajak main lagi dalam 5 jam~</p>
        <button class="btn btn-lavender" onclick="closeModal();renderHome()">Oke~ 💕</button>
      </div>
    </div>
  `);

  // Notif ke partner
  const partnerId  = getPartnerIdOf(activePet);
  const senderName = window.Telegram?.WebApp?.initDataUnsafe?.user?.first_name || 'Partnermu';
  const petInfo    = PETS[activePet.pet_type] || { emoji:'🐾' };
  sendTgNotif(partnerId, `🎾 <b>${senderName}</b> mengajak ${petInfo.emoji} <b>${activePet.name}</b> ${act}!\nSenang +${gain} | XP +${xpg}`);

  renderHome();
}

// ==================== HEAL ====================
async function doHeal() {
  if (!activePet) return;
  const inv = getInv();
  if (!inv.medicine || inv.medicine <= 0) {
    showToast('💊 Tidak punya obat! Beli di toko dulu~'); return;
  }
  inv.medicine -= 1;
  if (inv.medicine === 0) delete inv.medicine;
  const newHealth = Math.min(100, (activePet.health ?? 0) + 30);
  await saveInv(inv);
  await savePet(activePet.id, { health: newHealth });
  showToast(`💊 +30 Kesehatan! Sekarang ${newHealth}%`);

  // Notif ke partner
  const partnerId = getPartnerIdOf(activePet);
  const senderName = window.Telegram?.WebApp?.initDataUnsafe?.user?.first_name || 'Partnermu';
  const healInfo = PETS[activePet.pet_type] || { emoji:'🐾' };
  sendTgNotif(partnerId, `💊 <b>${senderName}</b> mengobati ${healInfo.emoji} <b>${activePet.name}</b>!\nKesehatan +30 → ${newHealth}%`);

  renderHome();
}

// ==================== CLEAN POOP ====================
async function doCleanPoop() {
  if (!activePet) return;
  const poopCount = activePet.poop_count || 0;
  if (poopCount <= 0) { showToast('✨ Kandang udah bersih!'); return; }

  const happyGain = Math.min(20, poopCount * 5);
  const newHappy  = Math.min(100, (activePet.happiness ?? 0) + happyGain);

  await savePet(activePet.id, { poop_count: 0, happiness: newHappy });

  showModal(`
    <div class="modal-box">
      <div class="modal-handle"></div>
      <div style="text-align:center">
        <div style="font-size:3.5rem;margin-bottom:12px">🧹✨</div>
        <div class="modal-title">Kandang Bersih!</div>
        <p style="color:var(--text-soft);margin-bottom:16px">
          <b>${activePet.name}</b> senang kandangnya wangi lagi~ 🌸<br>
          <b style="color:#9b73d4">😊 +${happyGain} Senang!</b>
        </p>
        <button class="btn btn-lavender" onclick="closeModal();renderHome()">Yay! 💕</button>
      </div>
    </div>
  `);

  // Notif ke partner
  const partnerId  = getPartnerIdOf(activePet);
  const senderName = window.Telegram?.WebApp?.initDataUnsafe?.user?.first_name || 'Partnermu';
  const petInfo    = PETS[activePet.pet_type] || { emoji: '🐾' };
  sendTgNotif(partnerId,
    `🧹 <b>${senderName}</b> udah bersihin kandang ${petInfo.emoji} <b>${activePet.name}</b>!\n` +
    `Senang +${happyGain} → ${newHappy}%\n\n<i>Kandang wangi lagi~ 🌸</i>`
  );

  renderHome();
}
function showBathMenu() {
  if (!activePet) return;
  const lastBath = activePet.last_bath ? new Date(activePet.last_bath) : null;
  const bathDays = activePet.soap_premium_active ? 2 : 1;
  if (lastBath) {
    const hoursSince = (Date.now() - lastBath.getTime()) / 3600000;
    if (hoursSince < bathDays * 24) {
      const nextH = Math.ceil(bathDays * 24 - hoursSince);
      showToast(`🛁 Sudah mandi! Mandi lagi dalam ${nextH} jam~`); return;
    }
  }
  const inv = getInv();
  const soapOptions = [{ key:'soap_basic', item: SPECIAL_SHOP.soap_basic, count: 999 }];
  ['soap_shampoo','soap_perfume','soap_premium'].forEach(k => {
    if ((inv[k]||0) > 0) soapOptions.push({ key:k, item: SPECIAL_SHOP[k], count: inv[k] });
  });
  const buttons = soapOptions.map(({key, item, count}) => `
    <button class="btn btn-soft" onclick="doBath('${key}')" style="margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;padding:12px 16px">
      <span>${item.emoji} ${item.name}${key !== 'soap_basic' ? ` x${count}` : ' (Gratis)'}</span>
      <span style="font-size:0.78rem;color:var(--text-soft)">${key==='soap_premium'?'Skip 2 hari':key==='soap_perfume'?'+Wangi 3j':key==='soap_shampoo'?'+😊+15':'+❤️+5'}</span>
    </button>`).join('');
  showModal(`
    <div class="modal-box">
      <div class="modal-handle"></div>
      <div class="modal-title">🛁 Mandi ${activePet.name}!</div>
      <p style="text-align:center;color:var(--text-soft);font-size:0.85rem;margin-bottom:16px">Pilih sabun yang mau dipakai~</p>
      ${buttons}
      <button class="btn btn-soft" onclick="closeModal()">❌ Batal</button>
    </div>
  `);
}

async function doBath(soapKey) {
  if (!activePet) return;
  const soap = SPECIAL_SHOP[soapKey];
  const inv = getInv();
  if (soapKey !== 'soap_basic') {
    if (!inv[soapKey] || inv[soapKey] <= 0) { showToast('❌ Stok sabun habis!'); return; }
    inv[soapKey] -= 1;
    if (inv[soapKey] === 0) delete inv[soapKey];
    await saveInv(inv);
  }
  const healthGain = soap.health || 5;
  const happyGain  = soap.happy  || 0;
  const premium    = soap.bath_days === 2;

async function openGacha(tier) {
  const price = tier === 'biasa' ? GACHA_BIASA_PRICE : GACHA_PREMIUM_PRICE;

  await saveUser({ koin: koin - price });

  const inv = getInv();
  const results = [];

  if (tier === 'biasa') {
    const key = gachaRollItem(GACHA_BIASA_TABLE);
    inv[key] = (inv[key]||0) + 1;
    const gi = GACHA_ITEMS[key];
    results.push(`${gi.emoji} <b>${gi.name}</b>`);
  } else {
    // 2 item
    for (let i = 0; i < 2; i++) {
      const key = gachaRollItem(GACHA_PREMIUM_TABLE);

      const gi = GACHA_ITEMS[key];

    results.push(`🥩 <b>Steak Petarung x${steakCount}</b> (bonus!)`);

    // 30% pet eksklusif
    if (Math.random() < 0.30) {
      const petType = GACHA_PET_POOL[Math.floor(Math.random()*GACHA_PET_POOL.length)];
      const pInfo   = PETS[petType] || { emoji:'🐾', name:'?' };
      // Cek sudah punya atau belum
      const alreadyHas = userPets.some(p => p.pet_type === petType);
      if (!alreadyHas) {
        const now2 = new Date().toISOString();
        await db.from('pets').insert({
          owner1_id: USER_ID, owner2_id: null,
          name: pInfo.name, pet_type: petType,
          level: 1, xp: 0, hunger: 30, happiness: 90, health: 100,

        await loadPets();
      } else {
        // Sudah punya, kasih bonus steak
        inv['battle_steak'] = (inv['battle_steak']||0) + 3;
        results.push(`🥩 <b>+3 Steak Petarung</b> (pet sudah punya, diganti!)`);
      }
    }
  }

  await saveInv(inv);

  const boxName = tier === 'biasa' ? '📦 Kotak Biasa' : '💎 Kotak Premium';
  const resultHtml = results.map(r => `<div style="padding:6px 0;border-bottom:1px solid rgba(201,184,240,0.2);font-size:0.9rem">• ${r}</div>`).join('');

  closeModal();

async function doSpBuy(key) {

  renderSpecialStore();

async function doGift(type, itemKey, targetOverride = null) {
  if (!activePet) return;
  const item = SPECIAL_SHOP[itemKey];
  const inv  = getInv();
  if (!inv[itemKey] || inv[itemKey] <= 0) { showToast('❌ Item habis!'); return; }

  // Cari target user ID
  let targetUid = null;
  if (type === 'partner') {
    targetUid = getPartnerIdOf(activePet);
    if (!targetUid) { showToast('❌ Pet belum punya partner!'); return; }
  } else {
    const raw = (targetOverride || '').replace('@', '').trim();
    const asNum = parseInt(raw);
    if (!isNaN(asNum) && String(asNum) === raw) {
      targetUid = asNum;
    } else {
      const { data, error } = await db.from('users').select('user_id').eq('username', raw).maybeSingle();
      if (error || !data) { showToast('❌ User tidak ditemukan!'); return; }
      targetUid = data.user_id;
    }
  }

  if (!targetUid) { showToast('❌ User tidak ditemukan!'); return; }
  if (targetUid === USER_ID) { showToast('❌ Ga bisa gift ke diri sendiri!'); return; }

  // Kurangi inventory pengirim dulu
  inv[itemKey] -= 1;
  if (inv[itemKey] === 0) delete inv[itemKey];
  await saveInv(inv);

  // Masukkan ke inventory penerima
  const targetInv = await getInvForUser(targetUid);
  targetInv[itemKey] = (targetInv[itemKey] || 0) + 1;
  const ok = await saveInvForUser(targetUid, targetInv);

  if (!ok) {
    // Rollback inventory pengirim kalau gagal
    inv[itemKey] = (inv[itemKey] || 0) + 1;
    await saveInv(inv);
    showToast('❌ Gagal kirim gift, coba lagi!');
    return;
  }

  closeModal();
  showModal(`
    <div class="modal-box">
      <div class="modal-handle"></div>
      <div style="text-align:center">
        <div style="font-size:3.5rem;margin-bottom:12px">🎁</div>
        <div class="modal-title">Gift Terkirim!</div>
        <p style="color:var(--text-soft);margin-bottom:16px">
          ${item.emoji} <b>${item.name}</b> sudah masuk ke inventori penerima~<br>
          <i style="font-size:0.8rem">Mereka bisa pakai sendiri ke pet pilihan mereka!</i>
        </p>
        <button class="btn btn-lavender" onclick="closeModal();renderHome()">Oke~ 💕</button>
      </div>
    </div>
  `);

  // Notif ke penerima
  const senderName = window.Telegram?.WebApp?.initDataUnsafe?.user?.first_name || 'Seseorang';
  await sendTgNotif(targetUid,
    `🎁 <b>${senderName}</b> mengirim hadiah!\n\n` +
    `${item.emoji} <b>${item.name}</b> sudah masuk ke inventorimu~\n` +
    `<i>Buka Pet → pakai item dari inventori!</i>`
  );
  renderHome();
}

async function doEquipAcc(itemKey, petIdx) {
  closeModal();
  const pet  = userPets[petIdx];
  if (!pet) return;
  const item = SPECIAL_SHOP[itemKey];
  const inv  = getInv();

  // Kalau pet sudah pakai aksesoris lain, kembalikan dulu ke inventory (FIX: pakai accessory_key)
  if (pet.accessory && pet.accessory_key) {
    inv[pet.accessory_key] = (inv[pet.accessory_key] || 0) + 1;
  } else if (pet.accessory) {
    // Fallback: cari dari SPECIAL_SHOP
    const oldKey = Object.entries(SPECIAL_SHOP).find(([k,v]) => v.emoji === pet.accessory && v.category === 'acc');
    if (oldKey) inv[oldKey[0]] = (inv[oldKey[0]] || 0) + 1;
  }

  // Kurangi inventory dan pasang aksesoris
  inv[itemKey] -= 1;
  if (inv[itemKey] === 0) delete inv[itemKey];
  await saveInv(inv);
  await savePet(pet.id, { accessory: item.emoji, accessory_name: item.name, accessory_key: itemKey });

  showToast(`✨ ${item.emoji} ${item.name} dipasang ke ${pet.name}!`);

  const partnerId  = getPartnerIdOf(pet);
  const senderName = window.Telegram?.WebApp?.initDataUnsafe?.user?.first_name || 'Partnermu';
  sendTgNotif(partnerId, `✨ <b>${senderName}</b> pasang ${item.emoji} <b>${item.name}</b> ke ${PETS[pet.pet_type]?.emoji||'🐾'} <b>${pet.name}</b>!`);

  await loadPets();
  renderInventory();
  if (currentScreen === 'home') renderHome();
}
